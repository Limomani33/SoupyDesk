<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SoupyChat</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0505;--bg2:#110808;--bg3:#1a0a0a;--panel:#130808ee;--border:#ff1a1a55;--border2:#ff1a1aaa;--accent:#ff1a1a;--accent2:#cc0000;--accent3:#ff1a1a66;--accent4:#ff1a1a18;--text:#ffcccc;--text-dim:#aa6666;--text-name:#ff1a1a;--name-glow:#ff1a1a88;--font:'Rajdhani',sans-serif;--mono:'Share Tech Mono',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);pointer-events:none;z-index:9999}
#app{height:100%;display:flex;flex-direction:column}
#toolbar{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--bg3);border-bottom:1px solid var(--border);flex-shrink:0}
#toolbar input[type=text]{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:5px 10px;font-family:var(--mono);font-size:12px;outline:none;border-radius:6px;flex:1}
#toolbar input:focus{border-color:var(--accent)}
#toolbar input::placeholder{color:var(--text-dim)}
button{background:linear-gradient(135deg,#2a0808,#1a0505);border:1px solid var(--border);color:var(--text);padding:5px 12px;font-family:var(--font);font-size:13px;font-weight:600;letter-spacing:.5px;cursor:pointer;transition:all .15s;border-radius:6px;outline:none}
button:hover{background:linear-gradient(135deg,var(--accent2),#880000);box-shadow:0 0 10px var(--accent3);color:#fff}
#send-btn{background:linear-gradient(135deg,var(--accent2),#660000);color:#fff;border-color:var(--accent)}
#conn{font-size:10px;color:var(--text-dim);white-space:nowrap;font-family:var(--mono)}
#conn.on{color:#00ff88}#conn.off{color:var(--accent)}
#char-c{font-size:10px;color:var(--text-dim);white-space:nowrap}
#chat{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:4px;scrollbar-width:thin;scrollbar-color:var(--accent2) var(--bg2)}
#chat::-webkit-scrollbar{width:4px}#chat::-webkit-scrollbar-thumb{background:var(--accent2);border-radius:2px}
.msg{padding:6px 10px;background:var(--accent4);border-left:2px solid var(--border);border-radius:0 6px 6px 0;animation:fi .2s ease;word-break:break-word}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.msg:hover{background:rgba(255,20,20,.08)}
.name{color:var(--text-name);font-family:var(--font);font-weight:700;font-size:13px;text-shadow:0 0 6px var(--name-glow)}
.msg-text{font-size:12px;color:var(--text)}
.msg.err-msg{border-left-color:#ff6600;background:rgba(255,100,0,.06)}
.msg.err-msg .msg-text{color:#ff9944}
#name-bar{padding:4px 10px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:8px;flex-shrink:0}
#name-bar span{color:var(--accent)}
</style>
</head>
<body>
<div id="app">
  <div id="name-bar">Connected as: <span id="nb-name">—</span> &nbsp;|&nbsp; <span id="conn" class="off">● CONNECTING...</span></div>
  <div id="chat"></div>
  <div id="toolbar">
    <input id="text" type="text" placeholder="Message... (max 300 chars)" maxlength="300" onkeydown="if(event.key==='Enter')send()" oninput="updateCounter()">
    <span id="char-c">0/300</span>
    <button id="send-btn" onclick="send()">Send</button>
  </div>
</div>
<script>
const MAX_CHARS = 300;
const STORAGE_KEY = "soupychat_phid_identity_v2";
const PHID_URL = "https://phid-accpanel.onrender.com";

let ws = null, joined = false, username = "Anonymous";

// Get username from PHID localStorage
function initUser() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try {
      const p = JSON.parse(saved);
      if (p.oauth && p.username) {
        username = p.username;
        document.getElementById("nb-name").textContent = username;
        return;
      }
    } catch(e) {}
  }
  // Try to get from parent SoupyDesk context
  parent.postMessage({SD:true, action:"getContext"}, "*");
}

window.addEventListener("message", e => {
  if (e.data?.SD && e.data.action === "context" && e.data.username) {
    username = e.data.username;
    document.getElementById("nb-name").textContent = username;
  }
});

function connect() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${proto}://soupychat.onrender.com/ws`);
  ws.onopen = () => {
    document.getElementById("conn").textContent = "● ONLINE";
    document.getElementById("conn").className = "on";
    ws.send(JSON.stringify({type:"join", name:username}));
    joined = true;
  };
  ws.onclose = () => {
    document.getElementById("conn").textContent = "● OFFLINE";
    document.getElementById("conn").className = "off";
    setTimeout(connect, 3000);
  };
  ws.onerror = () => ws.close();
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === "history") { document.getElementById("chat").innerHTML=""; msg.messages.forEach(addMsg); }
    else if (msg.type === "error") addErr(msg.content);
    else addMsg(msg);
  };
}

function addMsg(msg) {
  const chat = document.getElementById("chat");
  const d = document.createElement("div");
  d.className = "msg";
  if (msg.type === "image") {
    d.innerHTML = `<span class="name">${esc(msg.name)}</span><br><img src="${msg.content}" style="max-width:200px;border-radius:6px;margin-top:4px;border:1px solid var(--border)">`;
  } else if (msg.type === "audio") {
    d.innerHTML = `<span class="name">${esc(msg.name)}</span> <span class="msg-text">sent audio</span><br><audio src="${msg.content}" controls style="margin-top:4px;width:200px;filter:hue-rotate(330deg) saturate(1.5)"></audio>`;
  } else {
    d.innerHTML = `<span class="name">${esc(msg.name)}:</span> <span class="msg-text">${esc(msg.content)}</span>`;
  }
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function addErr(text) {
  const chat = document.getElementById("chat");
  const d = document.createElement("div");
  d.className = "msg err-msg";
  d.innerHTML = `<span class="msg-text">⚠ ${esc(text)}</span>`;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
  setTimeout(() => d.remove(), 4000);
}

function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function updateCounter() {
  const len = document.getElementById("text").value.length;
  const el  = document.getElementById("char-c");
  el.textContent = `${len}/300`;
  el.style.color = len >= 300 ? "var(--accent)" : len >= 250 ? "#ffaa00" : "var(--text-dim)";
}

function send() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const text = document.getElementById("text").value.trim();
  if (!text || text.length > MAX_CHARS) return;
  if (!joined) { ws.send(JSON.stringify({type:"join",name:username})); joined=true; }
  ws.send(JSON.stringify({type:"message",content:text}));
  document.getElementById("text").value = "";
  updateCounter();
}

initUser();
connect();
</script>
</body>
</html>
