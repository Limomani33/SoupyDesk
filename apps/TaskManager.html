<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
:root{--bg:#0a0505;--bg2:#110808;--bg3:#1a0a0a;--accent:#ff1a1a;--accent2:#cc0000;--accent3:#ff1a1a44;--accent4:#ff1a1a18;--text:#ffcccc;--text-dim:#aa6666;--border:#ff1a1a33;--green:#00ff88;--yellow:#fbbf24;--font:'Rajdhani',sans-serif;--mono:'Share Tech Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden}
#tm{height:100%;display:flex;flex-direction:column}
#tm-header{padding:12px 16px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
#tm-header h1{font-size:18px;font-weight:700;letter-spacing:2px;color:var(--accent)}
#tm-tabs{display:flex;gap:4px}
.tm-tab{padding:4px 12px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text-dim);border:1px solid transparent;transition:all .15s}
.tm-tab.active{background:var(--accent4);border-color:var(--border);color:var(--text)}
#tm-content{flex:1;overflow:hidden;display:flex;flex-direction:column}
/* Process table */
#proc-table{flex:1;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:8px 12px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);background:var(--bg2);border-bottom:1px solid var(--border);font-weight:600;cursor:pointer;user-select:none}
th:hover{color:var(--text)}
td{padding:8px 12px;border-bottom:1px solid #ff1a1a11;font-family:var(--mono);font-size:12px}
tr:hover td{background:var(--accent4)}
.proc-name{color:var(--text);font-family:var(--font);font-weight:600;font-size:13px}
.proc-type{font-size:10px;padding:2px 6px;border-radius:4px;margin-left:6px;font-family:var(--mono)}
.proc-type.system{background:#1a3a1a;color:var(--green);border:1px solid #00ff8833}
.proc-type.app{background:var(--accent4);color:var(--accent);border:1px solid var(--border)}
.cpu-bar{width:80px;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:6px}
.cpu-fill{height:100%;border-radius:3px;transition:width .5s}
.kill-btn{padding:3px 10px;background:#7f1d1d22;border:1px solid #ef444433;color:#f87171;border-radius:5px;cursor:pointer;font-size:11px;font-family:var(--font);transition:all .15s}
.kill-btn:hover{background:#ef444433;border-color:#ef4444}
.kill-btn.disabled{opacity:.3;cursor:not-allowed}
/* Performance */
#perf-view{flex:1;padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px;overflow-y:auto}
.perf-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px}
.perf-title{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:8px;font-weight:700}
.perf-val{font-size:28px;font-weight:700;color:var(--accent);font-family:var(--mono)}
.perf-sub{font-size:11px;color:var(--text-dim);margin-top:2px;font-family:var(--mono)}
.mini-bars{margin-top:10px;display:flex;flex-direction:column;gap:3px}
.mini-bar-row{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text-dim)}
.mini-bar{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.mini-fill{height:100%;background:var(--accent2);border-radius:2px;transition:width .5s}
/* Footer */
#tm-footer{padding:8px 16px;background:var(--bg3);border-top:1px solid var(--border);font-size:11px;color:var(--text-dim);display:flex;justify-content:space-between;font-family:var(--mono)}
</style>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
<div id="tm">
  <div id="tm-header">
    <h1>📊 Task Manager</h1>
    <div id="tm-tabs">
      <div class="tm-tab active" onclick="TM.tab('proc')">Processes</div>
      <div class="tm-tab" onclick="TM.tab('perf')">Performance</div>
    </div>
  </div>
  <div id="tm-content">
    <div id="proc-view">
      <div id="proc-table">
        <table id="proc-tbl">
          <thead><tr>
            <th onclick="TM.sort('title')">Name ↕</th>
            <th onclick="TM.sort('type')">Type</th>
            <th onclick="TM.sort('pid')">PID</th>
            <th onclick="TM.sort('cpu')">CPU%</th>
            <th onclick="TM.sort('mem')">MEM(MB)</th>
            <th>Action</th>
          </tr></thead>
          <tbody id="proc-body"></tbody>
        </table>
      </div>
    </div>
    <div id="perf-view" style="display:none">
      <div class="perf-card">
        <div class="perf-title">CPU Usage</div>
        <div class="perf-val" id="cpu-val">0%</div>
        <div class="perf-sub">Total processes</div>
        <div class="mini-bars" id="cpu-bars"></div>
      </div>
      <div class="perf-card">
        <div class="perf-title">Memory</div>
        <div class="perf-val" id="mem-val">0 MB</div>
        <div class="perf-sub">In use</div>
      </div>
      <div class="perf-card">
        <div class="perf-title">Processes</div>
        <div class="perf-val" id="proc-count">0</div>
        <div class="perf-sub">Running</div>
      </div>
      <div class="perf-card">
        <div class="perf-title">Uptime</div>
        <div class="perf-val" id="uptime-val">0s</div>
        <div class="perf-sub">Session time</div>
      </div>
    </div>
  </div>
  <div id="tm-footer">
    <span id="tf-left">0 processes</span>
    <span id="tf-right">Auto-refresh: 2s</span>
  </div>
</div>
<script>
const TM = (() => {
  let currentTab = "proc";
  let sortKey    = "title";
  let startTime  = Date.now();

  function tab(t) {
    currentTab = t;
    document.querySelectorAll(".tm-tab").forEach((el,i)=>el.classList.toggle("active",[...document.querySelectorAll(".tm-tab")][i].textContent.toLowerCase().includes(t)));
    document.getElementById("proc-view").style.display = t==="proc" ? "flex" : "none";
    document.getElementById("perf-view").style.display = t==="perf" ? "grid" : "none";
  }

  function sort(key) { sortKey = key; refresh(); }

  function refresh() {
    parent.postMessage({SD:true, action:"getProcesses"}, "*");
  }

  function uptime() {
    const s = Math.floor((Date.now()-startTime)/1000);
    if (s<60) return s+"s";
    if (s<3600) return Math.floor(s/60)+"m "+s%60+"s";
    return Math.floor(s/3600)+"h "+Math.floor(s%3600/60)+"m";
  }

  function renderProcesses(list) {
    list = [...list].sort((a,b)=>{
      const av=a[sortKey]??""; const bv=b[sortKey]??"";
      return typeof av==="number" ? bv-av : String(av).localeCompare(String(bv));
    });
    const tbody = document.getElementById("proc-body");
    tbody.innerHTML = list.map(p => {
      const cpuW = Math.min(100, (p.cpu||0)*10);
      const cpuColor = p.cpu>5?"#ff5555":p.cpu>2?"#fbbf24":"#00ff88";
      const isSystem = p.type==="system";
      return `<tr>
        <td class="proc-name">${p.icon||"⚡"} ${p.title||p.name}<span class="proc-type ${p.type||"app"}">${p.type||"app"}</span></td>
        <td style="color:var(--text-dim)">${p.type||"app"}</td>
        <td style="color:var(--text-dim)">${p.pid||0}</td>
        <td>
          <span class="cpu-bar"><span class="cpu-fill" style="width:${cpuW}%;background:${cpuColor}"></span></span>
          <span style="color:${cpuColor}">${p.cpu||0}%</span>
        </td>
        <td style="color:var(--text-dim)">${p.mem||0} MB</td>
        <td><button class="kill-btn${isSystem?" disabled":""}" onclick="${isSystem?"void(0)":"TM.kill('"+p.name+"')"}">${isSystem?"Protected":"End"}</button></td>
      </tr>`;
    }).join("");

    document.getElementById("tf-left").textContent = `${list.length} processes`;
    document.getElementById("proc-count").textContent = list.length;

    const totalCPU = list.reduce((s,p)=>s+(p.cpu||0),0).toFixed(1);
    const totalMem = list.reduce((s,p)=>s+(p.mem||0),0);
    document.getElementById("cpu-val").textContent = totalCPU+"%";
    document.getElementById("mem-val").textContent = totalMem+" MB";
    document.getElementById("uptime-val").textContent = uptime();
  }

  function kill(id) {
    if (!confirm(`End process "${id}"?`)) return;
    parent.postMessage({SD:true,action:"killProcess",id},"*");
  }

  window.addEventListener("message",e=>{
    if (!e.data?.SD) return;
    if (e.data.action==="processes") renderProcesses(e.data.list||[]);
  });

  setInterval(refresh, 2000);
  refresh();

  return {tab, sort, kill};
})();
</script>
</body>
</html>
