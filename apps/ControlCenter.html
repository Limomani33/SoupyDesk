<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
:root{--bg:#0a0505;--bg2:#110808;--bg3:#1a0a0a;--accent:#ff1a1a;--accent2:#cc0000;--accent3:#ff1a1a44;--accent4:#ff1a1a18;--text:#ffcccc;--text-dim:#aa6666;--border:#ff1a1a33;--border2:#ff1a1a66;--r:10px;--font:'Rajdhani',sans-serif;--mono:'Share Tech Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow-y:auto}
body{padding:20px}
h1{font-size:20px;font-weight:700;letter-spacing:2px;color:var(--accent);margin-bottom:4px}
.sub{font-size:12px;color:var(--text-dim);margin-bottom:18px;font-family:var(--mono)}
.section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin-bottom:12px}
.st{font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent2);margin-bottom:10px}
.row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);gap:10px}
.row:last-child{border-bottom:none}
.rl{flex:1}
.rl label{font-size:13px;font-weight:600;color:var(--text);display:block}
.rl .desc{font-size:11px;color:var(--text-dim);margin-top:1px;font-family:var(--mono)}
.tog{position:relative;width:40px;height:22px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.ts{position:absolute;inset:0;background:#330000;border-radius:11px;cursor:pointer;transition:.2s;border:1px solid var(--border2)}
.ts::before{content:'';position:absolute;left:3px;top:3px;width:14px;height:14px;background:#555;border-radius:50%;transition:.2s}
.tog input:checked+.ts{background:var(--accent2)}
.tog input:checked+.ts::before{transform:translateX(18px);background:#fff}
select,.sel{background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:5px 10px;font-family:var(--font);font-size:13px;outline:none;cursor:pointer}
select:focus{border-color:var(--accent)}
.btn{padding:6px 14px;border-radius:7px;border:1px solid var(--border);font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;background:var(--bg3);color:var(--text)}
.btn:hover{border-color:var(--accent2);color:var(--accent)}
.btn.primary{background:var(--accent2);color:#fff;border-color:var(--accent)}
.btn.primary:hover{background:var(--accent)}
.btn.danger{color:#ff6666;border-color:#ff666633}
.btn.danger:hover{background:#ff000018}
.status{font-size:11px;min-height:14px;margin-top:6px;font-family:var(--mono)}
.ok{color:#00ff88}.err{color:var(--accent)}
.icon-preview{width:46px;height:46px;border-radius:10px;border:1px solid var(--border2);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;transition:all .15s}
.icon-preview:hover{border-color:var(--accent2)}
.pinned-list{display:flex;flex-direction:column;gap:4px;margin-top:6px}
.pinned-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;font-size:13px}
.pinned-item .pi-name{flex:1}
.pinned-item .pi-rm{cursor:pointer;color:var(--text-dim);transition:color .15s}
.pinned-item .pi-rm:hover{color:var(--accent)}
.add-pin-row{display:flex;gap:6px;margin-top:6px}
.add-pin-row select{flex:1}
</style>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<h1>⚙️ Control Center</h1>
<div class="sub">Customize your SoupyDesk experience</div>

<!-- Appearance -->
<div class="section">
  <div class="st">🎨 Appearance</div>
  <div class="row">
    <div class="rl"><label>Wallpaper</label><div class="desc">Custom desktop background</div></div>
    <div style="display:flex;gap:6px">
      <button class="btn" onclick="CC.pickWallpaper()">Choose Image</button>
      <button class="btn danger" onclick="CC.resetWallpaper()">Reset</button>
    </div>
  </div>
  <div class="row">
    <div class="rl"><label>Cursor</label></div>
    <select id="sel-cursor" onchange="CC.setSetting('cursor',this.value)">
      <option value="default">Default</option>
      <option value="crosshair">Crosshair</option>
      <option value="pointer">Pointer</option>
      <option value="cell">Cell</option>
      <option value="none">Hidden</option>
    </select>
  </div>
  <div class="row">
    <div class="rl"><label>Custom Cursor</label><div class="desc">Upload .cur or .png</div></div>
    <button class="btn" onclick="CC.pickCursor()">Upload</button>
  </div>
  <div class="row">
    <div class="rl"><label>Scanlines</label><div class="desc">Retro CRT effect</div></div>
    <label class="tog"><input type="checkbox" id="tog-scan" onchange="CC.setSetting('scanlines',this.checked)"><span class="ts"></span></label>
  </div>
  <div class="row">
    <div class="rl"><label>Animations</label><div class="desc">Window animations</div></div>
    <label class="tog"><input type="checkbox" id="tog-anim" onchange="CC.setSetting('animations',this.checked)"><span class="ts"></span></label>
  </div>
</div>

<!-- Custom Icons -->
<div class="section">
  <div class="st">🖼️ Custom Icons</div>
  <div class="row">
    <div class="rl"><label>Folder</label></div>
    <div class="icon-preview" id="ico-folder" onclick="CC.pickIcon('folder')">📁</div>
  </div>
  <div class="row">
    <div class="rl"><label>HTML File</label></div>
    <div class="icon-preview" id="ico-html" onclick="CC.pickIcon('html')">🌐</div>
  </div>
  <div class="row">
    <div class="rl"><label>Error</label></div>
    <div class="icon-preview" id="ico-error" onclick="CC.pickIcon('error')">⚠️</div>
  </div>
  <div class="row">
    <div class="rl"><label>Warning</label></div>
    <div class="icon-preview" id="ico-warn" onclick="CC.pickIcon('warn')">⚡</div>
  </div>
  <div class="status" id="ico-status"></div>
</div>

<!-- Dock / Pinned Apps -->
<div class="section">
  <div class="st">📌 Pinned Apps (Dock)</div>
  <div class="pinned-list" id="pinned-list"></div>
  <div class="add-pin-row">
    <select id="add-pin-sel">
      <option value="">Add app...</option>
      <option value="Files">📁 Files</option>
      <option value="SoupyChat">💬 SoupyChat</option>
      <option value="SSearch">🌐 SSearch</option>
      <option value="SShell">🖥️ SShell</option>
      <option value="ControlCenter">⚙️ ControlCenter</option>
      <option value="TaskManager">📊 TaskManager</option>
      <option value="SessionManager">👤 SessionManager</option>
      <option value="ValueEditor">🔧 ValueEditor</option>
    </select>
    <button class="btn primary" onclick="CC.addPin()">Add</button>
  </div>
</div>

<!-- Privacy & Security -->
<div class="section">
  <div class="st">🔒 Privacy & Security</div>
  <div class="row">
    <div class="rl"><label>Show Clock</label></div>
    <label class="tog"><input type="checkbox" id="tog-clock" onchange="CC.setSetting('show_clock',this.checked)"><span class="ts"></span></label>
  </div>
  <div class="row">
    <div class="rl"><label>Recent Files Count</label></div>
    <select id="sel-recent" onchange="CC.setSetting('max_recent',parseInt(this.value))">
      <option value="5">5</option><option value="10">10</option><option value="20">20</option><option value="0">Disabled</option>
    </select>
  </div>
</div>

<!-- System -->
<div class="section">
  <div class="st">⚡ System</div>
  <div class="row">
    <div class="rl"><label>Reset Filesystem</label><div class="desc">Restores all system files</div></div>
    <button class="btn danger" onclick="CC.resetFS()">Reset</button>
  </div>
  <div class="row">
    <div class="rl"><label>Clear UI State</label><div class="desc">Resets window positions</div></div>
    <button class="btn danger" onclick="CC.clearState()">Clear</button>
  </div>
  <div class="status" id="sys-status"></div>
</div>

<input type="file" id="wp-input"  accept="image/*" style="display:none">
<input type="file" id="cur-input" accept=".cur,.png,.svg" style="display:none">

<script>
let ctx=null, settings={}, pinned=[];

window.addEventListener("message",e=>{
  if(!e.data?.SD) return;
  if(e.data.action==="context"){ctx=e.data;loadAll();}
  if(e.data.action==="settings"){settings=e.data.settings;applySettings();}
  if(e.data.action==="pinned"){pinned=e.data.apps;renderPinned();}
});

function loadAll(){
  parent.postMessage({SD:true,action:"getSettings"},"*");
  parent.postMessage({SD:true,action:"getPinned"},"*");
}

function applySettings(){
  set("tog-scan","checked",settings.scanlines!==false);
  set("tog-anim","checked",settings.animations!==false);
  set("tog-clock","checked",settings.show_clock!==false);
  set("sel-cursor","value",settings.cursor||"default");
  set("sel-recent","value",String(settings.max_recent||10));
  if(settings.icon_folder) setIcon("ico-folder",settings.icon_folder);
  if(settings.icon_html)   setIcon("ico-html",settings.icon_html);
  if(settings.icon_error)  setIcon("ico-error",settings.icon_error);
  if(settings.icon_warn)   setIcon("ico-warn",settings.icon_warn);
}

function set(id,prop,val){const el=document.getElementById(id);if(el)el[prop]=val;}
function setIcon(id,src){const el=document.getElementById(id);if(el)el.innerHTML=`<img src="${src}" style="width:30px;height:30px;border-radius:6px">`;}

function renderPinned(){
  document.getElementById("pinned-list").innerHTML=pinned.map((p,i)=>`
    <div class="pinned-item">
      <span>${p.icon}</span><span class="pi-name">${p.name}</span>
      <span class="pi-rm" onclick="CC.removePin(${i})">✕</span>
    </div>`).join("");
}

const ICONS={"Files":"📁","SoupyChat":"💬","SSearch":"🌐","SShell":"🖥️","ControlCenter":"⚙️","TaskManager":"📊","SessionManager":"👤","ValueEditor":"🔧"};

const CC={
  setSetting(k,v){settings[k]=v;parent.postMessage({SD:true,action:"setSetting",key:k,val:v},"*");},
  pickWallpaper(){
    const i=document.getElementById("wp-input");
    i.onchange=()=>{const r=new FileReader();r.onload=e=>{CC.setSetting("wallpaper",e.target.result);parent.postMessage({SD:true,action:"notify",msg:"Wallpaper applied!"},"*");};r.readAsDataURL(i.files[0]);};
    i.click();
  },
  resetWallpaper(){CC.setSetting("wallpaper",null);parent.postMessage({SD:true,action:"notify",msg:"Wallpaper reset."},"*");},
  pickCursor(){
    const i=document.getElementById("cur-input");
    i.onchange=()=>{const r=new FileReader();r.onload=e=>{CC.setSetting("customCursor",e.target.result);parent.postMessage({SD:true,action:"notify",msg:"Cursor applied!"},"*");};r.readAsDataURL(i.files[0]);};
    i.click();
  },
  pickIcon(type){
    const i=document.createElement("input");i.type="file";i.accept="image/*";
    i.onchange=()=>{const r=new FileReader();r.onload=e=>{CC.setSetting("icon_"+type,e.target.result);setIcon("ico-"+type,e.target.result);st("ico","ok","Icon updated!");};r.readAsDataURL(i.files[0]);};
    i.click();
  },
  addPin(){
    const sel=document.getElementById("add-pin-sel");
    const name=sel.value; if(!name)return;
    if(pinned.find(p=>p.name===name)){parent.postMessage({SD:true,action:"notify",msg:"Already pinned!"},"*");return;}
    pinned.push({name,icon:ICONS[name]||"⚡",type:"app"});
    parent.postMessage({SD:true,action:"setPinned",apps:pinned},"*");
    renderPinned(); sel.value="";
  },
  removePin(i){
    pinned.splice(i,1);
    parent.postMessage({SD:true,action:"setPinned",apps:pinned},"*");
    renderPinned();
  },
  async resetFS(){
    if(!confirm("Reset all system files?"))return;
    await fetch("/api/fs/reset",{method:"POST",headers:{"X-SD-Token":ctx?.token||""}});
    parent.postMessage({SD:true,action:"notify",msg:"Filesystem reset!"},"*");
    st("sys","ok","Reset done!");
  },
  clearState(){
    parent.postMessage({SD:true,action:"notify",msg:"State cleared. Refresh to apply."},"*");
    st("sys","ok","Done!");
  }
};

function st(id,cls,msg){const el=document.getElementById(id+"-status");if(el){el.className="status "+cls;el.textContent=msg;setTimeout(()=>el.textContent="",3000);}}

parent.postMessage({SD:true,action:"getContext"},"*");
</script>
</body>
</html>
