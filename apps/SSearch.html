<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
:root{--bg:#0a0505;--bg2:#110808;--bg3:#1a0a0a;--accent:#ff1a1a;--accent2:#cc0000;--accent3:#ff1a1a44;--text:#ffcccc;--text-dim:#aa6666;--border:#ff1a1a33;--r:10px;--font:'Rajdhani',sans-serif;--mono:'Share Tech Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden}
#browser{height:100%;display:flex;flex-direction:column}

/* toolbar */
#toolbar{
  display:flex;align-items:center;gap:6px;
  padding:8px 12px;background:var(--bg3);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.tb-btn{
  width:30px;height:30px;background:var(--bg2);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;
}
.tb-btn:hover{background:var(--accent3);border-color:var(--accent2)}
#url-bar{
  flex:1;background:var(--bg2);border:1px solid var(--border);
  color:var(--text);padding:6px 12px;border-radius:8px;
  font-family:var(--mono);font-size:12px;outline:none;
  transition:border-color .2s;
}
#url-bar:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent3)}
#url-bar::placeholder{color:var(--text-dim)}

/* tabs */
#tabs{
  display:flex;align-items:center;gap:4px;
  padding:6px 12px 0;background:var(--bg3);
  border-bottom:1px solid var(--border);flex-shrink:0;
  overflow-x:auto;
}
#tabs::-webkit-scrollbar{height:2px}
#tabs::-webkit-scrollbar-thumb{background:var(--accent2)}
.tab{
  display:flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:8px 8px 0 0;
  font-size:12px;cursor:pointer;white-space:nowrap;
  background:var(--bg2);border:1px solid var(--border);border-bottom:none;
  transition:all .15s;max-width:160px;overflow:hidden;
  color:var(--text-dim);
}
.tab.active{background:var(--bg);color:var(--text);border-color:var(--accent2)}
.tab .tab-close{margin-left:4px;opacity:.5;font-size:11px}
.tab .tab-close:hover{opacity:1;color:var(--accent)}
.tab-new{
  padding:4px 10px;background:transparent;border:1px solid var(--border);
  border-radius:8px 8px 0 0;font-size:16px;cursor:pointer;color:var(--text-dim);
  transition:all .15s;
}
.tab-new:hover{color:var(--accent);border-color:var(--accent2)}

/* frames */
#frames{flex:1;position:relative;background:#000}
.frame-wrap{position:absolute;inset:0;display:none}
.frame-wrap.active{display:block}
.frame-wrap iframe{width:100%;height:100%;border:none}

/* new tab page */
.newtab{
  width:100%;height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:24px;
  background:var(--bg);
}
.newtab h1{font-size:36px;font-weight:700;letter-spacing:4px;color:var(--accent);text-shadow:0 0 20px var(--accent3)}
.newtab .search-row{display:flex;gap:0;width:480px}
.newtab input{
  flex:1;background:var(--bg2);border:1px solid var(--border);border-right:none;
  color:var(--text);padding:12px 16px;border-radius:10px 0 0 10px;
  font-family:var(--mono);font-size:14px;outline:none;
}
.newtab input:focus{border-color:var(--accent)}
.newtab button{
  background:var(--accent2);border:1px solid var(--accent);color:#fff;
  padding:12px 20px;border-radius:0 10px 10px 0;cursor:pointer;
  font-family:var(--font);font-weight:700;font-size:14px;
  transition:background .15s;
}
.newtab button:hover{background:var(--accent)}
.quick-links{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;max-width:600px}
.ql{
  padding:8px 16px;background:var(--bg2);border:1px solid var(--border);
  border-radius:8px;color:var(--text-dim);font-size:13px;cursor:pointer;
  transition:all .15s;
}
.ql:hover{border-color:var(--accent2);color:var(--text)}
</style>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
<div id="browser">
  <div id="tabs">
    <div class="tab-new" onclick="SSearch.newTab()" title="New Tab">+</div>
  </div>
  <div id="toolbar">
    <button class="tb-btn" onclick="SSearch.back()" title="Back">←</button>
    <button class="tb-btn" onclick="SSearch.forward()" title="Forward">→</button>
    <button class="tb-btn" onclick="SSearch.reload()" title="Reload">↺</button>
    <button class="tb-btn" onclick="SSearch.home()" title="Home">⌂</button>
    <input id="url-bar" type="text" placeholder="Search or enter URL..." spellcheck="false">
    <button class="tb-btn" onclick="SSearch.go()" title="Go">→</button>
    <button class="tb-btn" onclick="SSearch.download()" title="Download page">⬇</button>
  </div>
  <div id="frames"></div>
</div>

<script>
const SSearch = (() => {
  let tabs    = [];
  let active  = null;
  let tabId   = 0;

  function resolveURL(raw) {
    raw = raw.trim();
    if (!raw) return null;
    // YouTube shortcut
    if (raw.startsWith("yt:")) return "https://www.youtube.com/results?search_query=" + encodeURIComponent(raw.slice(3));
    // URL
    if (/^https?:\/\//i.test(raw)) return raw;
    // Looks like domain
    if (/^[a-z0-9.-]+\.[a-z]{2,}/i.test(raw) && !raw.includes(" ")) return "https://" + raw;
    // Search
    return "https://www.google.com/search?q=" + encodeURIComponent(raw) + "&igu=1";
  }

  function newTab(url) {
    const id = "tab_" + (++tabId);

    // Tab element
    const tabEl = document.createElement("div");
    tabEl.className = "tab";
    tabEl.id = "tabel_" + id;
    tabEl.innerHTML = `<span class="tab-icon">🌐</span><span class="tab-title" id="ttitle_${id}">New Tab</span><span class="tab-close" onclick="SSearch.closeTab('${id}',event)">✕</span>`;
    tabEl.onclick = (e) => { if(!e.target.classList.contains("tab-close")) SSearch.switchTab(id); };

    const tabsEl = document.getElementById("tabs");
    tabsEl.insertBefore(tabEl, tabsEl.querySelector(".tab-new"));

    // Frame
    const wrap = document.createElement("div");
    wrap.className = "frame-wrap";
    wrap.id = "frame_" + id;

    if (url) {
      // Try direct first; on error use proxy
    const frame = document.createElement("iframe");
    frame.onerror = () => { frame.src = proxyURL(resolved); };
    frame.addEventListener('load', () => {
      try { frame.contentDocument; } catch(e) { frame.src = proxyURL(resolved); }
    });
      frame.src = url;
      frame.id  = "iframe_" + id;
      // For YouTube embed use nocookie
      frame.setAttribute("allow","autoplay;fullscreen;encrypted-media");
      frame.onload = () => {
        try {
          const t = frame.contentDocument?.title || url;
          document.getElementById("ttitle_"+id).textContent = t.slice(0,20);
        } catch(e) {}
      };
      wrap.appendChild(frame);
    } else {
      // New tab page
      wrap.innerHTML = `
        <div class="newtab">
          <h1>SSearch</h1>
          <div class="search-row">
            <input id="nt-input-${id}" type="text" placeholder="Search Google or enter URL...">
            <button onclick="SSearch.ntGo('${id}')">Go</button>
          </div>
          <div class="quick-links">
            <div class="ql" onclick="SSearch.navigate('${id}','https://www.youtube.com')">▶ YouTube</div>
            <div class="ql" onclick="SSearch.navigate('${id}','https://github.com')">🐙 GitHub</div>
            <div class="ql" onclick="SSearch.navigate('${id}','https://www.google.com')">🔍 Google</div>
            <div class="ql" onclick="SSearch.navigate('${id}','https://www.reddit.com')">🤖 Reddit</div>
            <div class="ql" onclick="SSearch.navigate('${id}','https://open.spotify.com')">🎵 Spotify</div>
            <div class="ql" onclick="SSearch.navigate('${id}','https://discord.com/app')">💬 Discord</div>
          </div>
        </div>`;
      const ntInput = wrap.querySelector("#nt-input-"+id);
      if (ntInput) {
        ntInput.addEventListener("keydown", e => { if(e.key==="Enter") SSearch.ntGo(id); });
        setTimeout(() => ntInput.focus(), 100);
      }
    }

    document.getElementById("frames").appendChild(wrap);
    tabs.push({id, url: url||null, wrap, tabEl});
    switchTab(id);
    return id;
  }

  function switchTab(id) {
    tabs.forEach(t => {
      t.wrap.classList.toggle("active", t.id===id);
      t.tabEl.classList.toggle("active", t.id===id);
    });
    active = id;
    const t = tabs.find(t=>t.id===id);
    if (t?.url) {
      document.getElementById("url-bar").value = t.url;
    } else {
      document.getElementById("url-bar").value = "";
    }
  }

  function closeTab(id, e) {
    if (e) { e.preventDefault(); e.stopPropagation(); }
    const idx = tabs.findIndex(t=>t.id===id);
    if (idx<0) return;
    tabs[idx].wrap.remove();
    tabs[idx].tabEl.remove();
    tabs.splice(idx,1);
    if (tabs.length === 0) newTab();
    else switchTab(tabs[Math.min(idx,tabs.length-1)].id);
  }

  function navigate(tabId, url) {
    const t = tabs.find(t=>t.id===tabId);
    if (!t) return;
    const resolved = resolveURL(url);
    if (!resolved) return;
    t.url = resolved;
    t.wrap.innerHTML = `<iframe src="${resolved}" allow="autoplay;fullscreen;encrypted-media" id="iframe_${tabId}"></iframe>`;
    const frame = document.getElementById("iframe_"+tabId);
    if (frame) frame.style.cssText="width:100%;height:100%;border:none";
    document.getElementById("url-bar").value = resolved;
    document.getElementById("ttitle_"+tabId).textContent = new URL(resolved).hostname.slice(0,18);
  }

  function ntGo(tabId) {
    const inp = document.getElementById("nt-input-"+tabId);
    if (inp) navigate(tabId, inp.value);
  }

  function go() {
    const val = document.getElementById("url-bar").value;
    if (!active) return;
    navigate(active, val);
  }

  function back()    { const f=activeFrame(); if(f) try{f.contentWindow.history.back()}catch(e){} }
  function forward() { const f=activeFrame(); if(f) try{f.contentWindow.history.forward()}catch(e){} }
  function reload()  { const f=activeFrame(); if(f) try{f.contentWindow.location.reload()}catch(e){} }
  function home()    { if(active) { const t=tabs.find(t=>t.id===active); if(t){t.url=null;t.wrap.innerHTML="";newTabPage(t);} } }

  function activeFrame() {
    if (!active) return null;
    return document.getElementById("iframe_"+active);
  }

  function download() {
    const f = activeFrame();
    if (!f) return;
    try {
      const url = f.contentWindow.location.href;
      const a = document.createElement("a");
      a.href=url; a.download="download"; a.click();
    } catch(e) {
      // Cross-origin — notify desktop
      parent.postMessage({SD:true,action:"notify",msg:"Cannot download from cross-origin page."},"*");
    }
  }

  document.getElementById("url-bar").addEventListener("keydown", e => {
    if (e.key==="Enter") go();
  });

  // Init with one tab
  newTab();

  return {newTab, switchTab, closeTab, navigate, ntGo, go, back, forward, reload, home, download};
})();
</script>
</body>
</html>
