<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
:root{--bg:#0a0505;--bg2:#110808;--bg3:#1a0a0a;--accent:#ff1a1a;--accent2:#cc0000;--accent3:#ff1a1a44;--accent4:#ff1a1a18;--text:#ffcccc;--text-dim:#aa6666;--border:#ff1a1a33;--border2:#ff1a1a66;--r:10px;--font:'Rajdhani',sans-serif;--mono:'Share Tech Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow-y:auto}
body{padding:20px}
h1{font-size:20px;font-weight:700;letter-spacing:2px;color:var(--accent);margin-bottom:4px}
.subtitle{font-size:12px;color:var(--text-dim);margin-bottom:20px;font-family:var(--mono)}
.section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;margin-bottom:14px}
.section-title{font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent2);margin-bottom:12px}
.row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);gap:12px}
.row:last-child{border-bottom:none}
.row-l{flex:1}
.row-l label{font-size:14px;font-weight:600;color:var(--text);display:block}
.row-l .desc{font-size:11px;color:var(--text-dim);margin-top:2px;font-family:var(--mono)}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.field label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
.field input{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:8px 12px;font-family:var(--mono);font-size:13px;outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--accent)}
.field input::placeholder{color:var(--text-dim)}
.btn{padding:7px 16px;border-radius:8px;border:1px solid var(--border);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;letter-spacing:.5px;background:var(--bg3);color:var(--text)}
.btn:hover{border-color:var(--accent2);color:var(--accent)}
.btn.primary{background:var(--accent2);color:#fff;border-color:var(--accent)}
.btn.primary:hover{background:var(--accent)}
.btn.danger{color:#ff6666;border-color:#ff666633}
.btn.danger:hover{background:#ff000018;border-color:#ff6666}
.status{font-size:12px;min-height:16px;margin-top:8px;font-family:var(--mono)}
.status.ok{color:#00ff88}.status.err{color:var(--accent)}
.avatar{width:60px;height:60px;border-radius:50%;background:var(--accent2);display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0;border:2px solid var(--border2)}
#user-info{display:flex;align-items:center;gap:16px;padding:12px 0;margin-bottom:8px}
#user-details h2{font-size:20px;font-weight:700;color:var(--text)}
#user-details p{font-size:12px;color:var(--text-dim);font-family:var(--mono)}
</style>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
<h1>👤 Session Manager</h1>
<div class="subtitle" id="sm-sub">Loading...</div>

<div id="user-info">
  <div class="avatar" id="sm-avatar">?</div>
  <div id="user-details">
    <h2 id="sm-username">—</h2>
    <p id="sm-home">—</p>
  </div>
</div>

<!-- Change Display Name -->
<div class="section">
  <div class="section-title">Identity</div>
  <div class="field">
    <label>Display Name</label>
    <input id="display-name" type="text" placeholder="Your display name">
  </div>
  <button class="btn primary" onclick="SM.saveDisplayName()">Save</button>
  <div class="status" id="dn-status"></div>
</div>

<!-- Change Password -->
<div class="section">
  <div class="section-title">Change Password</div>
  <div class="field"><label>Current Password</label><input id="old-pw" type="password" placeholder="••••••••"></div>
  <div class="field"><label>New Password</label><input id="new-pw" type="password" placeholder="••••••••"></div>
  <div class="field"><label>Confirm New Password</label><input id="new-pw2" type="password" placeholder="••••••••"></div>
  <button class="btn primary" onclick="SM.changePassword()">Change Password</button>
  <div class="status" id="pw-status"></div>
</div>

<!-- User Preferences -->
<div class="section">
  <div class="section-title">Preferences</div>
  <div class="row">
    <div class="row-l"><label>Show Clock</label><div class="desc">Display time in topbar</div></div>
    <input type="checkbox" id="pref-clock" onchange="SM.savePref('show_clock',this.checked)">
  </div>
  <div class="row">
    <div class="row-l"><label>Animations</label><div class="desc">Window open/close animations</div></div>
    <input type="checkbox" id="pref-anim" onchange="SM.savePref('animations',this.checked)">
  </div>
  <div class="row">
    <div class="row-l"><label>Dock Position</label></div>
    <select id="pref-dock" onchange="SM.savePref('dock_position',this.value)" style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:4px 8px">
      <option value="bottom">Bottom</option>
    </select>
  </div>
  <div class="row">
    <div class="row-l"><label>Font Size</label></div>
    <select id="pref-font" onchange="SM.savePref('font_size',this.value)" style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:4px 8px">
      <option value="small">Small</option>
      <option value="medium">Medium</option>
      <option value="large">Large</option>
    </select>
  </div>
  <div class="row">
    <div class="row-l"><label>Start Menu Style</label></div>
    <select id="pref-start" onchange="SM.savePref('start_menu_style',this.value)" style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:4px 8px">
      <option value="grid">Grid</option>
      <option value="list">List</option>
    </select>
  </div>
</div>

<!-- Sign Out -->
<div class="section">
  <div class="section-title">Session</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap">
    <button class="btn danger" onclick="SM.signOut()">⏻ Sign Out</button>
  </div>
</div>

<script>
let ctx = null;

window.addEventListener("message", e => {
  if (!e.data?.SD) return;
  if (e.data.action === "context") {
    ctx = e.data;
    init();
  }
  if (e.data.action === "settings") {
    applySettings(e.data.settings);
  }
});

function init() {
  document.getElementById("sm-sub").textContent = "Manage your SoupyDesk account";
  document.getElementById("sm-avatar").textContent = ctx.username?.[0]?.toUpperCase()||"?";
  document.getElementById("sm-username").textContent = ctx.username;
  document.getElementById("sm-home").textContent = ctx.userHome;
  parent.postMessage({SD:true,action:"getSettings"},"*");
}

function applySettings(s) {
  document.getElementById("display-name").value  = s.displayName || ctx.username;
  document.getElementById("pref-clock").checked  = s.show_clock !== false;
  document.getElementById("pref-anim").checked   = s.animations !== false;
  document.getElementById("pref-dock").value     = s.dock_position || "bottom";
  document.getElementById("pref-font").value     = s.font_size || "medium";
  document.getElementById("pref-start").value    = s.start_menu_style || "grid";
}

const SM = {
  async saveDisplayName() {
    const v = document.getElementById("display-name").value.trim();
    if (!v) { status2("dn","err","Name cannot be empty"); return; }
    parent.postMessage({SD:true,action:"setSetting",key:"displayName",val:v},"*");
    status2("dn","ok","Saved!");
  },
  async changePassword() {
    const old = document.getElementById("old-pw").value;
    const np  = document.getElementById("new-pw").value;
    const np2 = document.getElementById("new-pw2").value;
    if (!old||!np) { status2("pw","err","Fill all fields"); return; }
    if (np !== np2) { status2("pw","err","Passwords don't match"); return; }
    if (np.length < 4) { status2("pw","err","Min 4 characters"); return; }
    const r = await fetch("/api/auth/change-password",{
      method:"POST",
      headers:{"Content-Type":"application/json","X-SD-Token":ctx.token},
      body:JSON.stringify({old_password:old,new_password:np})
    }).then(r=>r.json());
    if (r.ok) {
      status2("pw","ok","Password changed!");
      document.getElementById("old-pw").value=document.getElementById("new-pw").value=document.getElementById("new-pw2").value="";
    } else {
      status2("pw","err",r.error||"Failed");
    }
  },
  savePref(key,val) {
    parent.postMessage({SD:true,action:"setSetting",key,val},"*");
  },
  signOut() { parent.postMessage({SD:true,action:"logout"},"*"); }
};

function status2(id,cls,msg) {
  const el=document.getElementById(id+"-status");
  el.className="status "+cls; el.textContent=msg;
  setTimeout(()=>el.textContent="",3000);
}

parent.postMessage({SD:true,action:"getContext"},"*");
</script>
</body>
</html>
