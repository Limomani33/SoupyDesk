<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
:root{--bg:#0a0505;--bg2:#110808;--bg3:#1a0a0a;--accent:#ff1a1a;--accent2:#cc0000;--accent3:#ff1a1a44;--accent4:#ff1a1a18;--text:#ffcccc;--text-dim:#aa6666;--border:#ff1a1a33;--border2:#ff1a1a66;--r:10px;--font:'Rajdhani',sans-serif;--mono:'Share Tech Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow-y:auto}
body{padding:20px}
h1{font-size:20px;font-weight:700;letter-spacing:2px;color:var(--accent);margin-bottom:4px}
.sub{font-size:12px;color:var(--text-dim);margin-bottom:18px;font-family:var(--mono)}
.section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin-bottom:12px}
.st{font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent2);margin-bottom:10px}
.row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);gap:10px}
.row:last-child{border-bottom:none}
.rl{flex:1}
.rl label{font-size:13px;font-weight:600;color:var(--text);display:block}
.rl .desc{font-size:11px;color:var(--text-dim);margin-top:1px;font-family:var(--mono)}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.field label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
.field input{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:8px 12px;font-family:var(--mono);font-size:13px;outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--accent)}
.field input::placeholder{color:var(--text-dim)}
.tog{position:relative;width:40px;height:22px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.ts{position:absolute;inset:0;background:#330000;border-radius:11px;cursor:pointer;transition:.2s;border:1px solid var(--border2)}
.ts::before{content:'';position:absolute;left:3px;top:3px;width:14px;height:14px;background:#555;border-radius:50%;transition:.2s}
.tog input:checked+.ts{background:var(--accent2)}
.tog input:checked+.ts::before{transform:translateX(18px);background:#fff}
select{background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:5px 10px;font-family:var(--font);font-size:13px;outline:none;cursor:pointer}
.btn{padding:7px 16px;border-radius:8px;border:1px solid var(--border);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;background:var(--bg3);color:var(--text)}
.btn:hover{border-color:var(--accent2);color:var(--accent)}
.btn.primary{background:var(--accent2);color:#fff;border-color:var(--accent)}
.btn.primary:hover{background:var(--accent)}
.btn.danger{color:#ff6666;border-color:#ff666633}
.btn.danger:hover{background:#ff000018;border-color:#ff6666}
.status{font-size:12px;min-height:16px;margin-top:8px;font-family:var(--mono)}
.ok{color:#00ff88}.err{color:var(--accent)}
.avatar{width:56px;height:56px;border-radius:50%;background:var(--accent2);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;border:2px solid var(--border2)}
#user-info{display:flex;align-items:center;gap:14px;padding:10px 0;margin-bottom:10px}
#user-details h2{font-size:18px;font-weight:700;color:var(--text)}
#user-details p{font-size:11px;color:var(--text-dim);font-family:var(--mono)}
</style>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
<h1>👤 Session Manager</h1>
<div class="sub" id="sm-sub">Loading...</div>
<div id="user-info">
  <div class="avatar" id="sm-avatar">?</div>
  <div id="user-details">
    <h2 id="sm-username">—</h2>
    <p id="sm-home">—</p>
  </div>
</div>
<div class="section">
  <div class="st">Identity</div>
  <div class="field"><label>Display Name</label><input id="display-name" type="text" placeholder="Your display name"></div>
  <button class="btn primary" onclick="SM.saveDisplayName()">Save Display Name</button>
  <div class="status" id="dn-status"></div>
</div>
<div class="section">
  <div class="st">Change Password</div>
  <div class="field"><label>Current Password</label><input id="old-pw" type="password" placeholder="••••••••"></div>
  <div class="field"><label>New Password</label><input id="new-pw" type="password" placeholder="••••••••"></div>
  <div class="field"><label>Confirm New</label><input id="new-pw2" type="password" placeholder="••••••••"></div>
  <button class="btn primary" onclick="SM.changePassword()">Change Password</button>
  <div class="status" id="pw-status"></div>
</div>
<div class="section">
  <div class="st">Preferences</div>
  <div class="row">
    <div class="rl"><label>Show Clock</label><div class="desc">Display time in topbar</div></div>
    <label class="tog"><input type="checkbox" id="pref-clock"><span class="ts"></span></label>
  </div>
  <div class="row">
    <div class="rl"><label>Animations</label><div class="desc">Window open/close effects</div></div>
    <label class="tog"><input type="checkbox" id="pref-anim"><span class="ts"></span></label>
  </div>
  <div class="row">
    <div class="rl"><label>Font Size</label></div>
    <select id="pref-font"><option value="small">Small</option><option value="medium">Medium</option><option value="large">Large</option></select>
  </div>
  <div class="row">
    <div class="rl"><label>Start Menu Style</label></div>
    <select id="pref-start"><option value="grid">Grid</option><option value="list">List</option></select>
  </div>
  <div class="row">
    <div class="rl"><label>Language</label></div>
    <select id="pref-lang"><option value="en">English</option><option value="es">Spanish</option><option value="fr">French</option><option value="de">German</option><option value="ja">Japanese</option></select>
  </div>
  <div style="margin-top:12px"><button class="btn primary" onclick="SM.savePrefs()">Save Preferences</button></div>
  <div class="status" id="pref-status"></div>
</div>
<div class="section">
  <div class="st">Session</div>
  <button class="btn danger" onclick="SM.signOut()">⏻ Sign Out</button>
</div>
<script>
let ctx=null, settings={};
window.addEventListener("message",e=>{
  if(!e.data?.SD) return;
  if(e.data.action==="context"){
    ctx=e.data;
    document.getElementById("sm-sub").textContent="Manage your SoupyDesk account";
    document.getElementById("sm-avatar").textContent=ctx.username?.[0]?.toUpperCase()||"?";
    document.getElementById("sm-username").textContent=ctx.username;
    document.getElementById("sm-home").textContent=ctx.userHome;
    parent.postMessage({SD:true,action:"getSettings"},"*");
  }
  if(e.data.action==="settings"){
    settings=e.data.settings||{};
    document.getElementById("display-name").value=settings.displayName||ctx?.username||"";
    document.getElementById("pref-clock").checked=settings.show_clock!==false;
    document.getElementById("pref-anim").checked=settings.animations!==false;
    document.getElementById("pref-font").value=settings.font_size||"medium";
    document.getElementById("pref-start").value=settings.start_menu_style||"grid";
    document.getElementById("pref-lang").value=settings.language||"en";
  }
});
const SM={
  saveDisplayName(){
    const v=document.getElementById("display-name").value.trim();
    if(!v){st("dn","err","Name cannot be empty");return;}
    parent.postMessage({SD:true,action:"setSetting",key:"displayName",val:v},"*");
    st("dn","ok","✓ Saved!");
  },
  async changePassword(){
    const old=document.getElementById("old-pw").value;
    const np=document.getElementById("new-pw").value;
    const np2=document.getElementById("new-pw2").value;
    if(!old||!np){st("pw","err","Fill all fields");return;}
    if(np!==np2){st("pw","err","Passwords don't match");return;}
    if(np.length<4){st("pw","err","Min 4 chars");return;}
    st("pw","","Changing...");
    const r=await fetch("/api/auth/change-password",{method:"POST",headers:{"Content-Type":"application/json","X-SD-Token":ctx?.token||""},body:JSON.stringify({old_password:old,new_password:np})}).then(r=>r.json()).catch(()=>({ok:false,error:"Network error"}));
    if(r.ok){st("pw","ok","✓ Password changed!");document.getElementById("old-pw").value=document.getElementById("new-pw").value=document.getElementById("new-pw2").value="";}
    else st("pw","err",r.error||"Failed");
  },
  savePrefs(){
    const s={...settings,show_clock:document.getElementById("pref-clock").checked,animations:document.getElementById("pref-anim").checked,font_size:document.getElementById("pref-font").value,start_menu_style:document.getElementById("pref-start").value,language:document.getElementById("pref-lang").value};
    parent.postMessage({SD:true,action:"saveSettings",settings:s},"*");
    settings=s;
    st("pref","ok","✓ Preferences saved!");
  },
  signOut(){parent.postMessage({SD:true,action:"logout"},"*");}
};
function st(id,cls,msg){const el=document.getElementById(id+"-status");if(el){el.className="status "+cls;el.textContent=msg;if(msg)setTimeout(()=>el.textContent="",3000);}}
parent.postMessage({SD:true,action:"getContext"},"*");
</script>
</body>
</html>
