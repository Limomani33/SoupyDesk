<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
:root{--bg:#0a0505;--accent:#ff1a1a;--accent2:#cc0000;--text:#ffcccc;--text-dim:#aa6666;--green:#00ff88;--blue:#60a5fa;--mono:'Share Tech Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;overflow:hidden}
#shell{height:100%;display:flex;flex-direction:column}
#output{
  flex:1;overflow-y:auto;padding:14px 16px;
  scrollbar-width:thin;scrollbar-color:var(--accent2) #1a0808;
}
#output::-webkit-scrollbar{width:4px}
#output::-webkit-scrollbar-thumb{background:var(--accent2);border-radius:2px}
.line{margin:1px 0;line-height:1.6;word-break:break-all}
.line.cmd{color:var(--green)}
.line.err{color:var(--accent)}
.line.info{color:var(--blue)}
.line.dim{color:var(--text-dim)}
.line.sys{color:#ff9944}
#input-row{
  display:flex;align-items:center;gap:8px;
  padding:10px 16px;border-top:1px solid #ff1a1a22;
  background:#0f0606;
}
#prompt{color:var(--green);white-space:nowrap;font-size:13px}
#cmd-input{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--text);font-family:var(--mono);font-size:13px;caret-color:var(--accent);
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
<div id="shell">
  <div id="output"></div>
  <div id="input-row">
    <span id="prompt">SShell $&gt;</span>
    <input id="cmd-input" type="text" autocomplete="off" spellcheck="false">
  </div>
</div>
<script>
const out     = document.getElementById("output");
const input   = document.getElementById("cmd-input");
let history   = [];
let histIdx   = -1;
let cwd       = "/";
let ctx       = null;

window.addEventListener("message", e => {
  if (!e.data?.SD) return;
  if (e.data.action === "context") {
    ctx = e.data;
    cwd = ctx.userHome + "/Desktop";
    updatePrompt();
    print("Logged in as: " + ctx.username, "info");
  }
  if (e.data.action === "fsResult" && fsCallbacks[e.data.reqId]) {
    fsCallbacks[e.data.reqId](e.data.result);
    delete fsCallbacks[e.data.reqId];
  }
  if (e.data.action === "uacVal") {
    print("UAC is currently: " + (e.data.val === "0" ? "OFF (UAC=0)" : "ON (UAC=1)"), "info");
  }
});

function print(text, cls="") {
  const d = document.createElement("div");
  d.className = "line " + cls;
  d.textContent = text;
  out.appendChild(d);
  out.scrollTop = out.scrollHeight;
}
function printHTML(html, cls="") {
  const d = document.createElement("div");
  d.className = "line " + cls;
  d.innerHTML = html;
  out.appendChild(d);
  out.scrollTop = out.scrollHeight;
}

// ── FS helper via postMessage ──────────────────────────────
let fsCallbacks = {};
let fsReqId = 0;
function fsOp(op, ...args) {
  return new Promise(resolve => {
    const id = "fs_" + (++fsReqId);
    fsCallbacks[id] = resolve;
    parent.postMessage({SD:true, action:"fsOp", op, args, reqId:id}, "*");
  });
}


// ── Commands ───────────────────────────────────────────────
const COMMANDS = {
  help() {
    print("Available commands:", "info");
    [
      "help              - Show this help",
      "ls [path]         - List directory",
      "cd <path>         - Change directory",
      "cat <file>        - Print file contents",
      "touch <file>      - Create empty file",
      "mkdir <dir>       - Create directory",
      "rm <path>         - Delete file/folder",
      "mv <src> <dst>    - Move/rename",
      "pwd               - Print working directory",
      "clear             - Clear terminal",
      "echo <text>       - Print text",
      "open <app>        - Open a SoupyDesk app",
      "uac               - Show UAC status",
      "/SCA UAC=0        - Disable UAC prompts",
      "/SCA UAC=1        - Enable UAC prompts",
      "crash             - Trigger system crash (demo)",
      "sysinfo           - Show system info",
      "neofetch          - Cool system info display",
    ].forEach(l => print("  " + l, "dim"));
  },
  async ls(args) {
    const path = resolvePath(args[0] || cwd);
    const data = await fsOp("list", path);
    if (data.error) { print("ls: " + data.error, "err"); return; }
    if (!data.items?.length) { print("(empty)", "dim"); return; }
    data.items.forEach(item => {
      const icon = item.type==="dir" ? "📁" : item.type==="app" ? "⚡" : "📄";
      const prot = item.protected ? " 🔒" : "";
      print(`  ${icon} ${item.name}${prot}`, item.type==="dir"?"info":"");
    });
  },
  cd(args) {
    if (!args[0]) { cwd="/"; updatePrompt(); return; }
    const newPath = resolvePath(args[0]);
    cwd = newPath;
    updatePrompt();
    print(`→ ${cwd}`, "dim");
  },
  async cat(args) {
    if (!args[0]) { print("Usage: cat <file>", "err"); return; }
    const path = resolvePath(args[0]);
    const data = await fsOp("read", path);
    if (data.error) { print("cat: " + data.error, "err"); return; }
    if (data.mime && data.mime.startsWith("text")) {
      try { print(atob(data.content)); } catch(e) { print(data.content); }
    } else {
      print("[Binary file: " + data.mime + "]", "dim");
    }
  },
  async touch(args) {
    if (!args[0]) { print("Usage: touch <file>", "err"); return; }
    const path = resolvePath(args[0]);
    const b64 = btoa("");
    await fsOp("write", path, b64, "text/plain", {});
    print("Created: " + path, "info");
  },
  async mkdir(args) {
    if (!args[0]) { print("Usage: mkdir <dir>", "err"); return; }
    await fsOp("mkdir", resolvePath(args[0]));
    print("Directory created.", "info");
  },
  async rm(args) {
    if (!args[0]) { print("Usage: rm <path>", "err"); return; }
    const path = resolvePath(args[0]);
    const force = args.includes("-f") || args.includes("--force");
    const result = await fsOp("delete", path, force);
    if (result.error === "protected") {
      print("⚠ Protected system file! Use 'rm --force " + args[0] + "' to delete anyway.", "sys");
    } else if (result.error) {
      print("rm: " + result.error, "err");
    } else {
      print("Deleted: " + path, "info");
      parent.postMessage({SD:true, action:"refreshDesk"}, "*");
    }
  },
  async mv(args) {
    if (args.length < 2) { print("Usage: mv <src> <dst>", "err"); return; }
    await fsOp("move", resolvePath(args[0]), resolvePath(args[1]));
    print("Moved.", "info");
  },
  pwd() { print(cwd); },
  clear() { out.innerHTML = ""; },
  echo(args) { print(args.join(" ")); },
  open(args) {
    const app = args[0];
    if (!app) { print("Usage: open <AppName>", "err"); return; }
    parent.postMessage({SD:true, action:"openApp", app}, "*");
    print("Opening " + app + "...", "info");
  },
  uac() {
    parent.postMessage({SD:true, action:"getUAC"}, "*");
  },
  "/SCA"(args) {
    const arg = args[0];
    if (arg === "UAC=0") {
      parent.postMessage({SD:true, action:"setUAC", val:"0"}, "*");
      print("UAC disabled. HTML files will open without prompts.", "sys");
    } else if (arg === "UAC=1") {
      parent.postMessage({SD:true, action:"setUAC", val:"1"}, "*");
      print("UAC enabled. HTML files will prompt before opening.", "sys");
    } else {
      print("Usage: /SCA UAC=0 or /SCA UAC=1", "err");
    }
  },
  crash() {
    parent.postMessage({SD:true, action:"crash", msg:"Manual crash triggered from SShell.", code:"ERR_MANUAL_CRASH"}, "*");
  },
  sysinfo() {
    print("SoupyDesk v1.0", "info");
    print("Platform: Web Browser", "dim");
    print("UA: " + navigator.userAgent.slice(0,60) + "...", "dim");
    print("Screen: " + screen.width + "x" + screen.height, "dim");
    print("Memory: " + (navigator.deviceMemory ? navigator.deviceMemory+"GB" : "Unknown"), "dim");
  },
  neofetch() {
    const logo = [
      "  ██████╗  ",
      "  ██╔════╝ ",
      "  ╚█████╗  ",
      "  ╚════██╗ ",
      "  ██████╔╝ ",
      "  ╚═════╝  ",
    ];
    const info = [
      "OS: SoupyDesk 1.0",
      "Shell: SShell",
      "Resolution: " + screen.width + "x" + screen.height,
      "Theme: SoapyCore 2",
      "Browser: " + (navigator.userAgent.includes("Chrome") ? "Chrome" : navigator.userAgent.includes("Firefox") ? "Firefox" : "Other"),
      "Memory: " + (navigator.deviceMemory ? navigator.deviceMemory+"GB" : "?"),
    ];
    logo.forEach((l,i) => {
      const line = document.createElement("div");
      line.className = "line";
      line.innerHTML = `<span style="color:#ff1a1a">${l}</span>  <span style="color:#60a5fa">${info[i]||""}</span>`;
      out.appendChild(line);
    });
    out.scrollTop = out.scrollHeight;
  }
};

// ── Path resolution ────────────────────────────────────────
function resolvePath(p) {
  if (!p) return cwd;
  if (p.startsWith("/")) return p;
  if (p === "..") {
    const parts = cwd.split("/").filter(Boolean);
    parts.pop();
    return "/" + parts.join("/");
  }
  return (cwd === "/" ? "" : cwd) + "/" + p;
}

function updatePrompt() {
  document.getElementById("prompt").textContent = `SShell ${cwd} $>`;
}

// ── Input handler ──────────────────────────────────────────
input.addEventListener("keydown", async e => {
  if (e.key === "Enter") {
    const raw = input.value.trim();
    if (!raw) return;
    history.unshift(raw);
    histIdx = -1;
    input.value = "";
    print(`SShell ${cwd} $> ${raw}`, "cmd");

    const parts = raw.split(/\s+/);
    const cmd   = parts[0];
    const args  = parts.slice(1);

    if (COMMANDS[cmd]) {
      await COMMANDS[cmd](args);
    } else {
      print(`Command not found: ${cmd}. Type 'help' for commands.`, "err");
    }
  } else if (e.key === "ArrowUp") {
    histIdx = Math.min(histIdx+1, history.length-1);
    input.value = history[histIdx] || "";
    e.preventDefault();
  } else if (e.key === "ArrowDown") {
    histIdx = Math.max(histIdx-1, -1);
    input.value = histIdx < 0 ? "" : history[histIdx];
    e.preventDefault();
  } else if (e.key === "Tab") {
    e.preventDefault();
    // Basic autocomplete
    const partial = input.value;
    const cmds = Object.keys(COMMANDS).filter(c => c.startsWith(partial));
    if (cmds.length === 1) input.value = cmds[0] + " ";
    else if (cmds.length > 1) print(cmds.join("  "), "dim");
  }
});

input.focus();
parent.postMessage({SD:true,action:"getContext"}, "*");
print("SShell v2.0 — SoupyDesk Terminal", "info");
print("Type 'help' for available commands.", "dim");
print("", "");
</script>
</body>
</html>
