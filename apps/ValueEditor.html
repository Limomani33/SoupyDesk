<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
:root{--bg:#0a0505;--bg2:#110808;--bg3:#1a0a0a;--accent:#ff1a1a;--accent2:#cc0000;--accent3:#ff1a1a44;--accent4:#ff1a1a18;--text:#ffcccc;--text-dim:#aa6666;--border:#ff1a1a33;--border2:#ff1a1a66;--r:8px;--font:'Rajdhani',sans-serif;--mono:'Share Tech Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;overflow:hidden}
#ve{height:100%;display:flex;flex-direction:column}
#ve-toolbar{padding:8px 12px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
#ve-toolbar h1{font-family:var(--font);font-size:16px;font-weight:700;color:var(--accent);letter-spacing:1px}
.vbtn{padding:5px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text-dim);font-size:12px;cursor:pointer;font-family:var(--font);transition:all .15s}
.vbtn:hover{border-color:var(--accent2);color:var(--text)}
#ve-search{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;width:180px}
#ve-search:focus{border-color:var(--accent)}
#ve-search::placeholder{color:var(--text-dim)}
#ve-main{flex:1;display:flex;overflow:hidden}
#ve-tree{width:220px;border-right:1px solid var(--border);padding:8px;overflow-y:auto;background:var(--bg2)}
.tree-cat{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);padding:6px 4px 3px;font-weight:700}
.tree-key{padding:5px 8px;border-radius:5px;cursor:pointer;color:var(--text-dim);transition:all .15s;display:flex;align-items:center;gap:6px;font-size:12px;word-break:break-word}
.tree-key:hover{background:var(--accent4);color:var(--text)}
.tree-key.selected{background:var(--accent4);color:var(--accent);border:1px solid var(--border)}
#ve-editor{flex:1;display:flex;flex-direction:column;overflow:hidden}
#ve-path{padding:6px 12px;background:var(--bg3);border-bottom:1px solid var(--border);font-size:11px;color:var(--text-dim)}
#ve-path span{color:var(--accent)}
#ve-table{flex:1;overflow-y:auto}
table{width:100%;border-collapse:collapse}
th{padding:7px 12px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);background:var(--bg2);border-bottom:1px solid var(--border);font-weight:600}
td{padding:7px 12px;border-bottom:1px solid #ff1a1a11;font-size:12px}
tr:hover td{background:var(--accent4)}
.val-name{color:var(--text);font-weight:600}
.val-type{color:var(--text-dim);font-size:10px}
.val-data{color:#60a5fa;word-break:break-all;max-width:200px}
.edit-btn{padding:2px 8px;background:var(--accent4);border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:11px;color:var(--text-dim);transition:all .15s}
.edit-btn:hover{border-color:var(--accent2);color:var(--text)}
.del-btn{padding:2px 8px;background:#7f1d1d22;border:1px solid #ef444422;border-radius:4px;cursor:pointer;font-size:11px;color:#f87171;transition:all .15s}
.del-btn:hover{background:#ef444433;border-color:#ef4444}
#ve-footer{padding:6px 12px;background:var(--bg3);border-top:1px solid var(--border);font-size:11px;color:var(--text-dim);display:flex;gap:12px}
/* Edit dialog */
#edit-overlay{position:fixed;inset:0;background:#000000aa;display:none;align-items:center;justify-content:center;z-index:999}
#edit-box{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:20px;width:380px;display:flex;flex-direction:column;gap:10px}
#edit-box h3{font-family:var(--font);font-size:16px;color:var(--accent)}
.ef{display:flex;flex-direction:column;gap:4px}
.ef label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
.ef input,.ef textarea{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);padding:7px 10px;font-family:var(--mono);font-size:12px;outline:none}
.ef input:focus,.ef textarea:focus{border-color:var(--accent)}
.ef textarea{resize:vertical;min-height:60px}
.ebtn-row{display:flex;gap:8px}
.ebtn{padding:7px 14px;border-radius:7px;border:1px solid var(--border);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.ebtn.save{background:var(--accent2);color:#fff;border-color:var(--accent)}
.ebtn.save:hover{background:var(--accent)}
.ebtn.cancel{background:transparent;color:var(--text-dim)}
.ebtn.cancel:hover{border-color:var(--accent2);color:var(--text)}
</style>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
<div id="ve">
  <div id="ve-toolbar">
    <h1>🔧 ValueEditor</h1>
    <button class="vbtn" onclick="VE.addKey()">+ New Value</button>
    <button class="vbtn" onclick="VE.reload()">↺ Reload</button>
    <input id="ve-search" placeholder="Search values..." oninput="VE.search(this.value)">
  </div>
  <div id="ve-main">
    <div id="ve-tree"></div>
    <div id="ve-editor">
      <div id="ve-path">Path: <span id="ve-path-val">Select a value</span></div>
      <div id="ve-table">
        <table>
          <thead><tr><th>Name</th><th>Type</th><th>Data</th><th>Actions</th></tr></thead>
          <tbody id="ve-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
  <div id="ve-footer">
    <span id="vf-count">0 values</span>
    <span>Values.SDVC — User Registry</span>
  </div>
</div>

<div id="edit-overlay">
  <div id="edit-box">
    <h3 id="edit-title">Edit Value</h3>
    <div class="ef"><label>Key Name</label><input id="edit-key" type="text" placeholder="Category.KeyName"></div>
    <div class="ef"><label>Value</label><textarea id="edit-val" placeholder="Value..."></textarea></div>
    <div class="ebtn-row">
      <button class="ebtn save" onclick="VE.saveEdit()">Save</button>
      <button class="ebtn cancel" onclick="VE.closeEdit()">Cancel</button>
    </div>
  </div>
</div>

<script>
let ctx = null;
let values = {};
let editKey = null;

window.addEventListener("message", e => {
  if (!e.data?.SD) return;
  if (e.data.action === "context") { ctx = e.data; loadValues(); }
  if (e.data.action === "fsResult" && e.data.reqId === "ve_read") {
    try {
      values = JSON.parse(atob(e.data.result.content||btoa("{}")));
    } catch(ex) { values = {}; }
    render();
  }
});

function loadValues() {
  parent.postMessage({SD:true,action:"fsOp",op:"read",body:{path:ctx.userHome+"/Values.SDVC"},reqId:"ve_read"},"*");
}

async function saveValues() {
  const b64 = btoa(JSON.stringify(values, null, 2));
  parent.postMessage({SD:true,action:"fsOp",op:"write",body:{path:ctx.userHome+"/Values.SDVC",content:b64,mime:"application/json"},reqId:"ve_write"},"*");
}

function getCategories() {
  const cats = {};
  Object.keys(values).forEach(k => {
    const parts = k.split(".");
    const cat = parts.length > 1 ? parts[0] : "General";
    if (!cats[cat]) cats[cat] = [];
    cats[cat].push(k);
  });
  return cats;
}

function render(filter="") {
  const cats = getCategories();
  const tree = document.getElementById("ve-tree");
  tree.innerHTML = Object.entries(cats).map(([cat,keys])=>`
    <div class="tree-cat">${cat}</div>
    ${keys.filter(k=>!filter||k.toLowerCase().includes(filter.toLowerCase())).map(k=>`
      <div class="tree-key" onclick="VE.selectKey('${k}')">${k.split(".").pop()}</div>`).join("")}
  `).join("");

  // Show all in table by default
  const tbody = document.getElementById("ve-tbody");
  const filtered = Object.entries(values).filter(([k])=>!filter||k.toLowerCase().includes(filter.toLowerCase()));
  tbody.innerHTML = filtered.map(([k,v])=>`
    <tr>
      <td class="val-name">${k}</td>
      <td class="val-type">${typeof v}</td>
      <td class="val-data">${JSON.stringify(v)}</td>
      <td style="display:flex;gap:4px">
        <button class="edit-btn" onclick="VE.editKey('${k}')">Edit</button>
        <button class="del-btn" onclick="VE.deleteKey('${k}')">Del</button>
      </td>
    </tr>`).join("");
  document.getElementById("vf-count").textContent = `${filtered.length} values`;
}

const VE = {
  selectKey(k) {
    document.querySelectorAll(".tree-key").forEach(el=>el.classList.toggle("selected",el.textContent===k.split(".").pop()));
    document.getElementById("ve-path-val").textContent = k;
  },
  addKey() {
    editKey = null;
    document.getElementById("edit-title").textContent = "New Value";
    document.getElementById("edit-key").value = "";
    document.getElementById("edit-val").value = "";
    document.getElementById("edit-key").disabled = false;
    document.getElementById("edit-overlay").style.display = "flex";
    document.getElementById("edit-key").focus();
  },
  editKey(k) {
    editKey = k;
    document.getElementById("edit-title").textContent = "Edit Value";
    document.getElementById("edit-key").value = k;
    document.getElementById("edit-key").disabled = true;
    document.getElementById("edit-val").value = JSON.stringify(values[k]);
    document.getElementById("edit-overlay").style.display = "flex";
    document.getElementById("edit-val").focus();
  },
  deleteKey(k) {
    if (!confirm(`Delete "${k}"?`)) return;
    delete values[k];
    saveValues();
    render();
  },
  saveEdit() {
    const k = document.getElementById("edit-key").value.trim();
    let v   = document.getElementById("edit-val").value.trim();
    if (!k) return;
    try { v = JSON.parse(v); } catch(e) { /* keep as string */ }
    values[k] = v;
    saveValues();
    render();
    this.closeEdit();
  },
  closeEdit() { document.getElementById("edit-overlay").style.display="none"; editKey=null; },
  reload()    { loadValues(); },
  search(q)   { render(q); }
};

parent.postMessage({SD:true,action:"getContext"},"*");
</script>
</body>
</html>
