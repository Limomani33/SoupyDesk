<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SoupyDesk</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0505;--bg2:#110808;--bg3:#1a0a0a;
  --panel:#130808ee;--panel2:#0f0505ee;
  --border:#ff1a1a33;--border2:#ff1a1a77;
  --accent:#ff1a1a;--accent2:#cc0000;
  --accent3:#ff1a1a44;--accent4:#ff1a1a18;
  --text:#ffcccc;--text-dim:#aa6666;
  --shadow:#ff1a1a44;
  --green:#00ff88;--blue:#60a5fa;--yellow:#fbbf24;
  --r:12px;--r-sm:8px;--r-lg:16px;
  --font:'Rajdhani',sans-serif;--mono:'Share Tech Mono',monospace;
  --dock-h:60px;--topbar-h:28px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  color:var(--text);font-family:var(--font);user-select:none}

/* ── TOPBAR (macOS style) ── */
#topbar{
  position:fixed;top:0;left:0;right:0;height:var(--topbar-h);
  background:rgba(10,5,5,.85);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);z-index:2000;
  display:flex;align-items:center;padding:0 12px;gap:8px;
}
#topbar-left{display:flex;align-items:center;gap:12px}
#start-btn{
  font-size:14px;cursor:pointer;padding:2px 8px;border-radius:6px;
  color:var(--accent);font-weight:700;font-family:var(--font);
  transition:background .15s;
}
#start-btn:hover{background:var(--accent4)}
.topbar-sep{width:1px;height:14px;background:var(--border2)}
#active-app-name{font-size:12px;color:var(--text-dim);font-family:var(--font);font-weight:600;letter-spacing:.5px}
#topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
#clock{font-size:12px;color:var(--text-dim);font-family:var(--mono)}
#topbar-user-badge{
  font-size:11px;color:var(--text-dim);font-family:var(--mono);
  padding:2px 8px;border:1px solid var(--border);border-radius:6px;cursor:pointer;
  transition:all .15s;
}
#topbar-user-badge:hover{border-color:var(--accent2);color:var(--text)}

/* ── DESKTOP ── */
#desktop{
  position:fixed;top:var(--topbar-h);left:0;right:0;bottom:var(--dock-h);
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%,#3a000033,transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 90%,#220000,transparent 60%),
    var(--bg);
  overflow:hidden;
}
#desktop::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);
}
#desktop-icons{
  position:absolute;inset:0;padding:16px;
  display:flex;flex-direction:column;flex-wrap:wrap;
  align-content:flex-start;gap:6px;z-index:1;
}
.desk-icon{
  width:80px;display:flex;flex-direction:column;align-items:center;
  gap:4px;padding:6px 4px;cursor:pointer;border-radius:var(--r-sm);
  transition:background .15s;
}
.desk-icon:hover{background:var(--accent4)}
.desk-icon.selected{background:var(--accent3)}
.desk-icon .dicon{
  width:52px;height:52px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-size:28px;
  background:linear-gradient(135deg,#1a0808,#2a0a0a);
  border:1px solid var(--border);
  box-shadow:0 4px 12px #00000066,0 0 0 1px var(--border2);
  transition:transform .15s,box-shadow .15s;
}
.desk-icon:hover .dicon{transform:scale(1.08);box-shadow:0 6px 20px #00000088,0 0 10px var(--accent3)}
.desk-icon .dlabel{font-size:11px;color:var(--text);text-align:center;
  text-shadow:0 1px 4px #000;word-break:break-word;max-width:76px;line-height:1.2}

/* ── DOCK ── */
#dock{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  height:var(--dock-h);min-width:200px;max-width:90vw;
  background:rgba(10,5,5,.8);backdrop-filter:blur(24px);
  border:1px solid var(--border2);border-bottom:none;
  border-radius:var(--r-lg) var(--r-lg) 0 0;
  display:flex;align-items:center;justify-content:center;
  gap:6px;padding:6px 16px;z-index:2000;
}
.dock-item{
  position:relative;width:44px;height:44px;border-radius:11px;
  display:flex;align-items:center;justify-content:center;font-size:24px;
  cursor:pointer;background:linear-gradient(135deg,#1a0808,#2a0a0a);
  border:1px solid var(--border);
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;
  box-shadow:0 2px 8px #00000066;flex-shrink:0;
}
.dock-item:hover{transform:translateY(-10px) scale(1.18);box-shadow:0 8px 24px #00000088,0 0 14px var(--accent3);border-color:var(--accent2)}
.dock-item.running::after{content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent)}
.dock-sep{width:1px;height:32px;background:var(--border2);margin:0 2px}
.dock-label{position:absolute;bottom:calc(100%+10px);left:50%;transform:translateX(-50%);
  background:#1a0808ee;border:1px solid var(--border2);padding:3px 8px;
  border-radius:6px;font-size:11px;color:var(--text);white-space:nowrap;
  opacity:0;pointer-events:none;transition:opacity .15s;backdrop-filter:blur(8px)}
.dock-item:hover .dock-label{opacity:1}

/* ── WINDOWS ── */
.window{
  position:absolute;background:var(--panel);border:1px solid var(--border2);
  border-radius:var(--r-lg);display:flex;flex-direction:column;
  box-shadow:0 20px 60px #000000aa,0 0 0 1px var(--border);
  overflow:hidden;min-width:300px;min-height:180px;
  animation:winOpen .2s cubic-bezier(.34,1.56,.64,1);
}
.window.focused{box-shadow:0 28px 80px #000000cc,0 0 0 1px var(--border2),0 0 20px var(--accent3)}
.window.blur{opacity:.92}
@keyframes winOpen{from{opacity:0;transform:scale(.88) translateY(10px)}to{opacity:1;transform:none}}

.win-tb{
  height:32px;background:linear-gradient(90deg,#1f0505,#2a0808);
  display:flex;align-items:center;padding:0 10px;gap:8px;
  cursor:move;flex-shrink:0;border-bottom:1px solid var(--border);
  border-radius:var(--r-lg) var(--r-lg) 0 0;
}
.wctrl{display:flex;gap:5px}
.wbtn{width:12px;height:12px;border-radius:50%;border:none;cursor:pointer;transition:filter .15s;flex-shrink:0}
.wbtn:hover{filter:brightness(1.4)}
.wbtn.close{background:#ff5f57}
.wbtn.min  {background:#febc2e}
.wbtn.max  {background:#28c840}
.wtitle{flex:1;text-align:center;font-size:12px;font-family:var(--font);
  font-weight:600;color:var(--text-dim);letter-spacing:1px;pointer-events:none}
.wbody{flex:1;overflow:hidden;display:flex;flex-direction:column;border-radius:0 0 var(--r-lg) var(--r-lg)}
.wbody iframe{width:100%;height:100%;border:none;background:var(--bg)}
.wbody.native{overflow:auto;padding:0}
.wresize{position:absolute;bottom:0;right:0;width:18px;height:18px;cursor:nw-resize}
.wresize::before{content:'';position:absolute;bottom:4px;right:4px;width:8px;height:8px;
  border-right:2px solid var(--accent2);border-bottom:2px solid var(--accent2);border-radius:0 0 3px 0}

/* ── START MENU ── */
#start-menu{
  position:fixed;top:var(--topbar-h);left:0;width:320px;
  background:#0f0505ee;backdrop-filter:blur(24px);
  border:1px solid var(--border2);border-top:none;
  border-radius:0 0 var(--r-lg) 0;z-index:3000;
  display:none;flex-direction:column;
  box-shadow:4px 4px 30px #000000aa;
  max-height:calc(100vh - var(--topbar-h) - var(--dock-h));
}
#start-menu.open{display:flex;animation:winOpen .15s ease}
#sm-search{padding:12px}
#sm-search input{
  width:100%;background:var(--bg2);border:1px solid var(--border2);
  border-radius:8px;padding:8px 12px;color:var(--text);
  font-family:var(--mono);font-size:13px;outline:none;
}
#sm-search input:focus{border-color:var(--accent)}
#sm-search input::placeholder{color:var(--text-dim)}
#sm-grid{
  padding:0 12px 12px;display:grid;grid-template-columns:repeat(3,1fr);gap:6px;
  overflow-y:auto;flex:1;
}
.sm-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:10px 4px;border-radius:10px;cursor:pointer;
  transition:background .15s;border:1px solid transparent;
}
.sm-item:hover{background:var(--accent4);border-color:var(--border)}
.sm-icon{font-size:28px}
.sm-label{font-size:11px;text-align:center;color:var(--text);line-height:1.2}
#sm-footer{
  border-top:1px solid var(--border);padding:8px 12px;
  display:flex;justify-content:space-between;align-items:center;
}
#sm-username{font-size:12px;color:var(--text-dim);font-family:var(--mono)}
#sm-poweroff{font-size:11px;color:var(--text-dim);cursor:pointer;padding:4px 8px;
  border:1px solid var(--border);border-radius:6px;transition:all .15s}
#sm-poweroff:hover{border-color:var(--accent);color:var(--accent)}

/* ── SESSION MANAGER (login screen) ── */
#session-screen{
  position:fixed;inset:0;z-index:9999;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%,#3a000055,transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 90%,#220000,transparent 60%),
    var(--bg);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:0;
}
#session-screen::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.05) 2px,rgba(0,0,0,.05) 4px);
}
.ss-box{
  background:var(--panel);border:1px solid var(--border2);
  border-radius:var(--r-lg);padding:36px 40px;width:380px;
  box-shadow:0 0 80px var(--shadow);z-index:1;
  animation:winOpen .3s ease;
}
.ss-logo{font-size:28px;font-weight:700;letter-spacing:3px;color:var(--accent);
  text-shadow:0 0 20px var(--accent3);text-transform:uppercase;
  font-family:var(--font);text-align:center;margin-bottom:6px}
.ss-sub{font-size:13px;color:var(--text-dim);text-align:center;margin-bottom:24px;font-family:var(--mono)}
.ss-tabs{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:20px}
.ss-tab{flex:1;padding:8px;text-align:center;cursor:pointer;font-family:var(--font);
  font-weight:700;font-size:14px;transition:all .15s;color:var(--text-dim)}
.ss-tab.active{background:var(--accent2);color:#fff}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.field label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;font-family:var(--mono)}
.field input{
  background:var(--bg2);border:1px solid var(--border2);border-radius:8px;
  color:var(--text);padding:10px 12px;font-family:var(--mono);font-size:14px;
  outline:none;transition:border-color .2s;
}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent3)}
.field input::placeholder{color:var(--text-dim)}
.ss-btn{
  width:100%;padding:11px;border-radius:8px;border:none;
  background:var(--accent2);color:#fff;font-family:var(--font);
  font-size:16px;font-weight:700;letter-spacing:1px;cursor:pointer;
  transition:all .2s;margin-top:4px;
}
.ss-btn:hover{background:var(--accent);box-shadow:0 0 16px var(--accent3)}
.ss-err{font-size:12px;color:var(--accent);text-align:center;min-height:16px;margin-top:8px;font-family:var(--mono)}
.ss-userlist{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;max-height:200px;overflow-y:auto}
.ss-usercard{
  display:flex;align-items:center;gap:12px;padding:10px 14px;
  background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  cursor:pointer;transition:all .15s;
}
.ss-usercard:hover{border-color:var(--accent2);background:var(--accent4)}
.ss-avatar{width:36px;height:36px;border-radius:50%;background:var(--accent2);
  display:flex;align-items:center;justify-content:center;font-size:18px}
.ss-uname{font-size:14px;font-weight:700;color:var(--text)}
.ss-uinfo{font-size:11px;color:var(--text-dim);font-family:var(--mono)}

/* ── UAC ── */
#uac-overlay{
  position:fixed;inset:0;background:#000000bb;
  display:none;align-items:center;justify-content:center;z-index:8000;backdrop-filter:blur(8px);
}
#uac-box{
  background:var(--panel);border:1px solid var(--border2);border-radius:var(--r-lg);
  padding:28px;width:380px;box-shadow:0 0 60px var(--shadow);animation:winOpen .2s ease;
}
#uac-box h2{font-size:18px;color:var(--accent);margin-bottom:8px;letter-spacing:1px}
#uac-box p{font-size:13px;color:var(--text-dim);line-height:1.6;margin-bottom:20px;font-family:var(--mono)}
.uac-btns{display:flex;gap:10px}
.btn{padding:8px 18px;border-radius:8px;border:1px solid var(--border);
  font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-p{background:var(--accent2);color:#fff;border-color:var(--accent)}
.btn-p:hover{background:var(--accent)}
.btn-g{background:transparent;color:var(--text-dim)}
.btn-g:hover{border-color:var(--accent2);color:var(--text)}

/* ── PASS PROMPT ── */
#pass-overlay{
  position:fixed;inset:0;background:#000000bb;
  display:none;align-items:center;justify-content:center;z-index:7000;backdrop-filter:blur(8px);
}
#pass-box{
  background:var(--panel);border:1px solid var(--border2);border-radius:var(--r-lg);
  padding:28px;width:340px;box-shadow:0 0 60px var(--shadow);animation:winOpen .2s ease;
  display:flex;flex-direction:column;gap:12px;
}
#pass-box h2{font-size:16px;color:var(--text);letter-spacing:1px}
#pass-box p{font-size:13px;color:var(--text-dim);font-family:var(--mono)}

/* ── CTX MENU ── */
#ctx-menu{
  position:fixed;display:none;background:#1a0808f0;border:1px solid var(--border2);
  border-radius:10px;padding:5px;z-index:6000;min-width:160px;
  backdrop-filter:blur(20px);box-shadow:0 8px 32px #000000aa;
}
.ci{padding:7px 12px;border-radius:6px;font-size:13px;cursor:pointer;
  color:var(--text);transition:background .1s;display:flex;align-items:center;gap:8px}
.ci:hover{background:var(--accent4)}
.ci.danger{color:#ff7777}
.ci.danger:hover{background:#ff000018}
.csep{height:1px;background:var(--border);margin:3px 6px}

/* ── FILE VIEWER ── */
#viewer-overlay{position:fixed;inset:0;background:#000000cc;display:none;align-items:center;justify-content:center;z-index:7500;backdrop-filter:blur(8px)}
#viewer-box{background:var(--panel);border:1px solid var(--border2);border-radius:var(--r-lg);padding:0;width:min(90vw,800px);max-height:85vh;display:flex;flex-direction:column;overflow:hidden;animation:winOpen .2s ease}
#viewer-bar{padding:10px 16px;background:linear-gradient(90deg,#1f0505,#2a0808);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
#viewer-title{font-size:13px;color:var(--text-dim);font-family:var(--mono)}
#viewer-content{flex:1;overflow:auto;padding:16px;display:flex;align-items:center;justify-content:center;min-height:200px}
#viewer-content img{max-width:100%;max-height:60vh;border-radius:8px;object-fit:contain}
#viewer-content audio{width:100%}
#viewer-content pre{white-space:pre-wrap;word-break:break-word;font-family:var(--mono);font-size:12px;color:var(--text);width:100%;max-height:60vh;overflow:auto}
/* ── CRASH ── */
#crash{
  position:fixed;inset:0;background:#000;display:none;
  align-items:center;justify-content:center;z-index:99999;
  flex-direction:column;gap:16px;font-family:var(--mono);
}
#crash h1{color:#fff;font-size:28px;letter-spacing:4px}
#crash p{color:#555;font-size:13px;letter-spacing:2px;text-align:center;line-height:1.8}
#crash .code{color:#ff5555;font-size:11px;margin-top:4px}
.crash-btn{margin-top:20px;padding:10px 24px;background:#111;border:1px solid #333;
  color:#aaa;border-radius:8px;cursor:pointer;font-family:var(--mono);font-size:13px}
.crash-btn:hover{border-color:#ff5555;color:#ff5555}

/* ── NOTIFICATION ── */
.notif{
  position:fixed;top:calc(var(--topbar-h) + 10px);right:12px;z-index:5000;
  background:#1a0808f0;border:1px solid var(--border2);border-radius:10px;
  padding:10px 16px;font-size:13px;color:var(--text);
  box-shadow:0 4px 20px #000000aa;backdrop-filter:blur(12px);
  animation:notifIn .3s ease;pointer-events:none;max-width:260px;line-height:1.5;
  font-family:var(--mono);
}
@keyframes notifIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--accent2);border-radius:2px}
</style>
</head>
<body>

<!-- SESSION SCREEN -->
<div id="session-screen">
  <div class="ss-box" id="ss-box">
    <div class="ss-logo">⬡ SoupyDesk</div>
    <div class="ss-sub" id="ss-sub">Loading users...</div>
    <div id="ss-content"></div>
  </div>
</div>

<!-- TOPBAR -->
<div id="topbar" style="display:none">
  <div id="topbar-left">
    <span id="start-btn" onclick="SD.toggleStartMenu()">⬡ SoupyDesk</span>
    <div class="topbar-sep"></div>
    <span id="active-app-name"></span>
  </div>
  <div id="topbar-right">
    <span id="clock"></span>
    <span id="topbar-user-badge" onclick="SD.openApp('SessionManager')">👤 —</span>
  </div>
</div>

<!-- DESKTOP -->
<div id="desktop" style="display:none">
  <div id="desktop-icons"></div>
</div>

<!-- DOCK -->
<div id="dock" style="display:none"></div>

<!-- START MENU -->
<div id="start-menu">
  <div id="sm-search"><input id="sm-input" placeholder="Search apps..." oninput="SD.smSearch(this.value)"></div>
  <div id="sm-grid"></div>
  <div id="sm-footer">
    <span id="sm-username"></span>
    <span id="sm-poweroff" onclick="SD.logout()">⏻ Sign Out</span>
  </div>
</div>

<!-- UAC -->
<div id="uac-overlay">
  <div id="uac-box">
    <h2>⚠ Access Control</h2>
    <p id="uac-msg">This file is requesting permission to run.</p>
    <div class="uac-btns">
      <button class="btn btn-p" onclick="SD.uacAllow()">Allow</button>
      <button class="btn btn-g" onclick="SD.uacDeny()">Deny</button>
    </div>
  </div>
</div>

<!-- PASSWORD PROMPT -->
<div id="pass-overlay">
  <div id="pass-box">
    <h2 id="pass-title">🔒 Protected Folder</h2>
    <p id="pass-desc">Enter the password for this user:</p>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pass-input" placeholder="••••••••">
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-p" onclick="SD.passConfirm()" style="flex:1">Unlock</button>
      <button class="btn btn-g" onclick="SD.passCancel()">Cancel</button>
    </div>
    <div id="pass-err" style="font-size:12px;color:var(--accent);min-height:16px;font-family:var(--mono)"></div>
  </div>
</div>

<!-- CTX MENU -->
<div id="ctx-menu"></div>

<!-- CRASH -->
<div id="crash">
  <h1>SYSTEM ERROR</h1>
  <p id="crash-msg">A critical system file was removed.<br>SoupyDesk cannot continue.</p>
  <div class="code" id="crash-code">ERR_SYSTEM_FILE_MISSING</div>
  <button class="crash-btn" onclick="SD.crashRecover()">↺ Restore System Files</button>
</div>

<script>
/* ════════════════════════════════════════════════════════════
   SOUPYDESK 2.0 CORE
════════════════════════════════════════════════════════════ */
const SD = (() => {
  // ── State ──────────────────────────────────────────────────
  let currentUser  = null;  // {username, token}
  let userHome     = null;  // "/System/Users/username"
  let windows      = {};
  let zTop         = 100;
  let uacCallback  = null;
  let passCallback = null;
  let passUsername = null;
  let settings     = {};
  let pinnedApps   = [];
  let uacEnabled   = true;
  let startOpen    = false;
  let processes    = {};  // id -> {name, title, pid, startTime, cpu, mem}
  let procId       = 1;

  // ── API helpers ─────────────────────────────────────────────
  async function api(path, opts={}) {
    const headers = {"Content-Type":"application/json", ...(opts.headers||{})};
    if (currentUser?.token) headers["X-SD-Token"] = currentUser.token;
    const r = await fetch(path, {headers, ...opts});
    return r.json();
  }
  async function fsApi(op, body={}) {
    if (op === "list" || op === "read") {
      const params = new URLSearchParams(body);
      if (currentUser?.token) params.set("token", currentUser.token);
      return fetch(`/api/fs/${op}?${params}`).then(r=>r.json());
    }
    return api(`/api/fs/${op}`, {method:"POST", body:JSON.stringify(body)});
  }

  // ── Session Screen ──────────────────────────────────────────

    const data = await api("/api/auth/users");
    const users = data.users || [];
    const content = document.getElementById("ss-content");
    document.getElementById("ss-sub").textContent = "Welcome to SoupyDesk";

    if (users.length > 0) {
      showLoginScreen(users);
    } else {
      showSignupScreen(true);
    }
  }

        <div class="field"><label>Password</label><input id="ss-np" type="password" placeholder="••••••••" autocomplete="new-password"></div>
        <div class="field"><label>Confirm Password</label><input id="ss-np2" type="password" placeholder="••••••••"></div>

  function showSignupScreen(firstTime) {
    const content = document.getElementById("ss-content");
    if (firstTime) {
      document.getElementById("ss-sub").textContent = "Create your first account";
    }
    content.innerHTML = `
      <div class="field"><label>Username</label><input id="ss-nu" type="text" placeholder="choose_username" autocomplete="username"></div>
      <div class="field"><label>Password</label><input id="ss-np" type="password" placeholder="••••••••" autocomplete="new-password"></div>
      <div class="field"><label>Confirm Password</label><input id="ss-np2" type="password" placeholder="••••••••"></div>
      <button class="ss-btn" onclick="SD.ssSignup()">Create Account →</button>
      <div class="ss-err" id="ss-err2"></div>`;
    setTimeout(() => {
      document.getElementById("ss-np2")?.addEventListener("keydown",e=>{if(e.key==="Enter")SD.ssSignup()});

  function ssTab(tab) {
    document.getElementById("tab-login").classList.toggle("active", tab==="login");
    document.getElementById("tab-signup").classList.toggle("active", tab==="signup");
    document.getElementById("ss-login").style.display  = tab==="login"  ? "block" : "none";
    document.getElementById("ss-signup").style.display = tab==="signup" ? "block" : "none";
  }

  function ssSelectUser(username) {
    // Show password form for selected user
    document.getElementById("ss-userlist").style.display="none";
    const form = document.getElementById("ss-login-form");
    form.style.display="block";
    const uinput = document.getElementById("ss-uname");
    if (uinput) uinput.value = username;
    document.getElementById("ss-pw")?.focus();
  }

  async function ssLogin() {
    const username = (document.getElementById("ss-uname")?.value || "").trim();
    const password = document.getElementById("ss-pw")?.value || "";
    const errEl    = document.getElementById("ss-err");
    if (!username||!password){errEl.textContent="Fill in all fields.";return;}
    errEl.textContent = "Signing in...";
    const data = await api("/api/auth/login", {method:"POST", body:JSON.stringify({username,password})});
    if (!data.ok){errEl.textContent=data.error||"Login failed.";return;}
    await boot(data.username, data.token);
  }

  async function ssSignup() {
    const username = (document.getElementById("ss-nu")?.value||"").trim();
    const password = document.getElementById("ss-np")?.value||"";
    const confirm  = document.getElementById("ss-np2")?.value||"";
    const errEl    = document.getElementById("ss-err2");
    if (!username||!password){errEl.textContent="Fill in all fields.";return;}
    if (password!==confirm){errEl.textContent="Passwords do not match.";return;}
    errEl.textContent="Creating account...";
    const data = await api("/api/auth/signup",{method:"POST",body:JSON.stringify({username,password})});
    if (!data.ok){errEl.textContent=data.error||"Signup failed.";return;}
    await boot(data.username, data.token);
  }

  // ── Boot desktop ────────────────────────────────────────────
  async function boot(username, token) {
    currentUser = {username, token};
    userHome    = `/System/Users/${username}`;

    // Load user settings
    await loadUserSettings();

    // Show desktop
    document.getElementById("session-screen").style.display = "none";
    document.getElementById("topbar").style.display  = "flex";
    document.getElementById("desktop").style.display = "block";
    document.getElementById("dock").style.display    = "flex";

    // Apply settings
    applySettings();
    buildDock();
    buildStartMenu();
    renderDesktop();
    startClock();

    document.getElementById("topbar-user-badge").textContent = `👤 ${username}`;
    document.getElementById("sm-username").textContent = username;

    // Start background process watcher
    startProcessMonitor();

    // Register core processes
    registerProcess("WindowManager",  "Window Manager",     "system");
    registerProcess("DesktopShell",   "Desktop Shell",      "system");
    registerProcess("DockService",    "Dock",               "system");
    registerProcess("FileSystem",     "File System Service","system");

    notify(`Welcome back, ${username}!`);
  }

  async function loadUserSettings() {
    try {
      const data = await fsApi("read", {path: userHome + "/Settings.SDConfig"});
      if (data.content) {
        settings = JSON.parse(atob(data.content));
      }
    } catch(e) { settings = {}; }
    try {
      const data = await fsApi("read", {path: userHome + "/PinnedApps.SDConfig"});
      if (data.content) {
        pinnedApps = JSON.parse(atob(data.content));
      }
    } catch(e) { pinnedApps = DEFAULT_APPS.slice(0,5).map(a=>({name:a.name,icon:a.icon,type:"app"})); }
    uacEnabled = settings.uac !== false;
  }

  async function saveUserSettings() {
    const b64 = btoa(JSON.stringify(settings, null, 2));
    await fsApi("write", {path:userHome+"/Settings.SDConfig", content:b64, mime:"application/json"});
  }

  async function savePinnedApps() {
    const b64 = btoa(JSON.stringify(pinnedApps, null, 2));
    await fsApi("write", {path:userHome+"/PinnedApps.SDConfig", content:b64, mime:"application/json"});
  }

  function applySettings() {
    const desk = document.getElementById("desktop");
    if (settings.wallpaper) {
      desk.style.backgroundImage = `url(${settings.wallpaper})`;
      desk.style.backgroundSize  = "cover";
      desk.style.backgroundPosition = "center";
    }
    if (settings.customCursor) {
      document.body.style.cursor = `url(${settings.customCursor}), auto`;
    } else if (settings.cursor) {
      document.body.style.cursor = settings.cursor;
    }
  }

  // ── All apps definition ─────────────────────────────────────
  const DEFAULT_APPS = [
    {name:"Files",         icon:"📁", url:"/app/Files",         w:820,h:540},
    {name:"SoupyChat",     icon:"💬", url:"/app/SoupyChat",                 w:720,h:560},
    {name:"SSearch",       icon:"🌐", url:"/app/SSearch",       w:960,h:640},
    {name:"SShell",        icon:"🖥️", url:"/app/SShell",        w:700,h:460},
    {name:"ControlCenter", icon:"⚙️", url:"/app/ControlCenter", w:580,h:520},
    {name:"TaskManager",   icon:"📊", url:"/app/TaskManager",   w:600,h:440},
    {name:"SessionManager",icon:"👤", url:"/app/SessionManager",w:500,h:480},
    {name:"ValueEditor",   icon:"🔧", url:"/app/ValueEditor",   w:660,h:500},
  ];

  function getAppDef(name) {
    return DEFAULT_APPS.find(a=>a.name===name);
  }

  // ── Dock ────────────────────────────────────────────────────
  function buildDock() {
    const dock = document.getElementById("dock");
    dock.innerHTML = "";
    // Use pinnedApps if available, else use defaults
    const apps = pinnedApps.length > 0 ? pinnedApps : DEFAULT_APPS.slice(0,5).map(a=>({name:a.name,icon:a.icon,type:"app"}));
    apps.forEach(app => {
      const def = getAppDef(app.name);
      const icon = app.icon || (def?.icon) || "⚡";
      const el = document.createElement("div");
      el.className = "dock-item";
      el.dataset.app = app.name;
      el.innerHTML = `<span>${icon}</span><div class="dock-label">${app.name}</div>`;
      el.onclick = () => toggleOrOpenApp(app.name);
      dock.appendChild(el);
    });
    const sep = document.createElement("div"); sep.className="dock-sep"; dock.appendChild(sep);
    const trash = document.createElement("div");
    trash.className="dock-item";
    trash.innerHTML=`<span>🗑️</span><div class="dock-label">Trash</div>`;
    trash.onclick=()=>notify("Trash is empty.");
    dock.appendChild(trash);
  }

  function updateDock() {
    document.querySelectorAll(".dock-item[data-app]").forEach(el=>{
      const running = el.dataset.app in windows;
      el.classList.toggle("running", running);
    });
  }

  // ── Start Menu ──────────────────────────────────────────────
  function buildStartMenu() {
    const grid = document.getElementById("sm-grid");
    grid.innerHTML = DEFAULT_APPS.map(a=>`
      <div class="sm-item" onclick="SD.openApp('${a.name}');SD.closeStartMenu()">
        <div class="sm-icon">${a.icon}</div>
        <div class="sm-label">${a.name}</div>
      </div>`).join("");
  }

  function toggleStartMenu() {
    startOpen = !startOpen;
    document.getElementById("start-menu").classList.toggle("open", startOpen);
    if (startOpen) setTimeout(()=>document.getElementById("sm-input")?.focus(),100);
  }
  function closeStartMenu() { startOpen=false; document.getElementById("start-menu").classList.remove("open"); }

  async function smSearch(q) {
    const grid = document.getElementById("sm-grid");
    if (!q) { buildStartMenu(); return; }
    const appMatches = DEFAULT_APPS.filter(a=>a.name.toLowerCase().includes(q.toLowerCase()));
    let html = appMatches.map(a=>`
      <div class="sm-item" onclick="SD.openApp('${a.name}');SD.closeStartMenu()">
        <div class="sm-icon">${a.icon}</div>
        <div class="sm-label">${a.name}</div>
      </div>`).join("");
    // Also search desktop files
    try {
      if (userHome) {
        const data = await fsApi("list", {path:userHome+"/Desktop"});
        const fileMatches = (data.items||[]).filter(i=>i.name.toLowerCase().includes(q.toLowerCase()));
        html += fileMatches.map(i=>`
          <div class="sm-item" onclick="SD.handleSmFileOpen('${i.name}');SD.closeStartMenu()">
            <div class="sm-icon">${iconFor(i)}</div>
            <div class="sm-label">${i.name}</div>
          </div>`).join("");
      }
    } catch(e) {}
    grid.innerHTML = html || `<div style="grid-column:1/-1;text-align:center;color:var(--text-dim);font-size:13px;padding:20px">No results</div>`;
  }

  // ── Window Manager ──────────────────────────────────────────
  function createWindow({id, title, icon="📄", width=700, height=500, x, y, url, native}) {
    if (windows[id]) { focusWindow(id); restoreWindow(id); return; }

    const W = document.getElementById("desktop").offsetWidth;
    const H = document.getElementById("desktop").offsetHeight;
    const spread = Object.keys(windows).length;
    x = x ?? Math.max(20, Math.min(W-width-20, 60+spread*28));
    y = y ?? Math.max(20, Math.min(H-height-20, 30+spread*28));

    const win = document.createElement("div");
    win.className = "window focused";
    win.id = "win-"+id;
    win.style.cssText=`left:${x}px;top:${y}px;width:${width}px;height:${height}px;z-index:${++zTop}`;

    const bodyContent = native
      ? `<div class="wbody native" id="wbody-${id}">${native}</div>`
      : `<div class="wbody" id="wbody-${id}"><iframe src="${url}" id="iframe-${id}" allow="autoplay;fullscreen;encrypted-media" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-downloads allow-modals"></iframe></div>`;

    win.innerHTML = `
      <div class="win-tb" id="wtb-${id}">
        <div class="wctrl">
          <button class="wbtn close" onclick="SD.closeWindow('${id}')"></button>
          <button class="wbtn min"   onclick="SD.minimizeWindow('${id}')"></button>
          <button class="wbtn max"   onclick="SD.maximizeWindow('${id}')"></button>
        </div>
        <div class="wtitle">${icon} ${title}</div>
      </div>
      ${bodyContent}
      <div class="wresize" id="wr-${id}"></div>`;

    document.getElementById("desktop").appendChild(win);

    const pid = procId++;
    windows[id] = {el:win, minimized:false, url, title, icon, maximized:false,
                   savedPos:{x,y,w:width,h:height}, pid};
    processes[id] = {name:id, title, icon, pid, startTime:Date.now(), cpu:0, mem:0, type:"app"};

    makeDraggable(win, document.getElementById("wtb-"+id));
    makeResizable(win, document.getElementById("wr-"+id));
    win.addEventListener("mousedown",()=>focusWindow(id));

    updateDock();
    document.getElementById("active-app-name").textContent = title;
    return win;
  }

  function focusWindow(id) {
    Object.values(windows).forEach(w=>{w.el.classList.remove("focused");w.el.classList.add("blur")});
    if (windows[id]) {
      windows[id].el.classList.add("focused");
      windows[id].el.classList.remove("blur");
      windows[id].el.style.zIndex=++zTop;
      document.getElementById("active-app-name").textContent = windows[id].title;
    }
  }

  function closeWindow(id) {
    if (!windows[id]) return;
    windows[id].el.remove();
    delete windows[id];
    delete processes[id];
    updateDock();
    const remaining = Object.values(windows);
    document.getElementById("active-app-name").textContent = remaining.length ? remaining[remaining.length-1].title : "";
  }

  function minimizeWindow(id) {
    if (!windows[id]) return;
    windows[id].el.style.display="none";
    windows[id].minimized=true;
    updateDock();
  }

  function restoreWindow(id) {
    if (!windows[id]) return;
    windows[id].el.style.display="flex";
    windows[id].minimized=false;
    focusWindow(id);
  }

  function maximizeWindow(id) {
    if (!windows[id]) return;
    const w=windows[id], desk=document.getElementById("desktop");
    if (w.maximized) {
      const {x,y,ww,hh}=w.savedPos;
      Object.assign(w.el.style,{left:x+"px",top:y+"px",width:ww+"px",height:hh+"px",borderRadius:"var(--r-lg)"});
      w.maximized=false;
    } else {
      w.savedPos={x:parseInt(w.el.style.left),y:parseInt(w.el.style.top),ww:w.el.offsetWidth,hh:w.el.offsetHeight};
      Object.assign(w.el.style,{left:"0",top:"0",width:desk.offsetWidth+"px",height:desk.offsetHeight+"px",borderRadius:"0"});
      w.maximized=true;
    }
    w.el.style.zIndex=++zTop;
  }

  function toggleOrOpenApp(name) {
    if (windows[name]) {
      if (windows[name].minimized) restoreWindow(name);
      else if (windows[name].el.classList.contains("focused")) minimizeWindow(name);
      else focusWindow(name);
    } else {
      openApp(name);
    }
  }

  // ── Drag & Resize ───────────────────────────────────────────
  function makeDraggable(win, handle) {
    let drag=false, ox=0, oy=0;
    handle.addEventListener("mousedown",e=>{
      if (e.target.classList.contains("wbtn")) return;
      drag=true; ox=e.clientX-win.offsetLeft; oy=e.clientY-win.offsetTop; e.preventDefault();
    });
    document.addEventListener("mousemove",e=>{
      if (!drag) return;
      const desk=document.getElementById("desktop");
      win.style.left=Math.max(0,Math.min(desk.offsetWidth-60, e.clientX-ox))+"px";
      win.style.top =Math.max(0,Math.min(desk.offsetHeight-30,e.clientY-oy))+"px";
    });
    document.addEventListener("mouseup",()=>drag=false);
  }

  function makeResizable(win, handle) {
    let res=false, sx=0, sy=0, sw=0, sh=0;
    handle.addEventListener("mousedown",e=>{
      res=true; sx=e.clientX; sy=e.clientY; sw=win.offsetWidth; sh=win.offsetHeight;
      e.preventDefault(); e.stopPropagation();
    });
    document.addEventListener("mousemove",e=>{
      if (!res) return;
      win.style.width  = Math.max(300,sw+(e.clientX-sx))+"px";
      win.style.height = Math.max(180,sh+(e.clientY-sy))+"px";
    });
    document.addEventListener("mouseup",()=>res=false);
  }

  // ── App Launcher ────────────────────────────────────────────
  function openApp(name, extra={}) {
    const def = getAppDef(name);
    if (!def) { notify("App not found: "+name); return; }
    if (windows[name]) { toggleOrOpenApp(name); return; }
    createWindow({id:name, title:def.title||name, icon:def.icon, width:def.w, height:def.h, url:def.url, ...extra});
  }

  function openHTMLFile(path, name) {
    if (uacEnabled) {
      showUAC(`"${name}" wants to run as an application.`, ()=>_openHTML(path,name));
    } else {
      _openHTML(path,name);
    }
  }

  async function _openHTML(path, name) {
    const data = await fsApi("read",{path});
    if (data.error){notify("Cannot open: "+data.error);return;}
    let content;
    try{content=atob(data.content);}catch(e){content=data.content;}
    const blob = new Blob([content],{type:"text/html"});
    const src  = URL.createObjectURL(blob);
    const id   = "file_"+Date.now();
    createWindow({id, title:name, icon:"🌐", width:800, height:560, url:src});
  }

  // ── Desktop ─────────────────────────────────────────────────
  async function renderDesktop() {
    if (!currentUser) return;
    const data = await fsApi("list",{path:userHome+"/Desktop"});
    const container = document.getElementById("desktop-icons");
    container.innerHTML = "";
    if (!data.items?.length) return;
    data.items.forEach(item=>{
      const el = document.createElement("div");
      el.className="desk-icon";
      el.innerHTML=`<div class="dicon">${iconFor(item)}</div><div class="dlabel">${item.name}</div>`;
      el.ondblclick=()=>handleFileOpen(item, userHome+"/Desktop/"+item.name);
      el.draggable = true;
      el.dataset.filename = item.name;
      el.ondragstart = e => {
        e.dataTransfer.setData("sd-desktop-file", item.name);
        e.dataTransfer.effectAllowed = "move";
        el.style.opacity = "0.5";
      };
      el.ondragend = () => { el.style.opacity = "1"; };
      el.oncontextmenu=e=>{e.preventDefault();showCtx(e.clientX,e.clientY,[
        {l:"Open",i:"📂",fn:()=>handleFileOpen(item,userHome+"/Desktop/"+item.name)},
        "sep",
        {l:"Delete",i:"🗑️",d:true,fn:async()=>{
          await fsApi("delete",{path:userHome+"/Desktop/"+item.name});
          renderDesktop();
        }}
      ])};
      container.appendChild(el);
    });
  }

  function handleFileOpen(item, path) {
    if (item.type==="dir") openApp("Files",{startPath:path});
    else if (item.type==="app") openApp(item.name.replace(".app",""));
    else if (item.name.match(/\.html?$/i)) openHTMLFile(path, item.name);
    else if (item.name.match(/\.(txt|md|json|sdconfig|sdvc|log|csv)$/i)) openFileViewer(path, item.name);
    else if (item.name.match(/\.(png|jpg|jpeg|gif|webp|svg|bmp)$/i)) openFileViewer(path, item.name);
    else if (item.name.match(/\.(mp3|wav|ogg|flac|aac)$/i)) openFileViewer(path, item.name);
    else notify("Cannot preview: "+item.name);
  }

  function handleSmFileOpen(name) {
    const path = userHome + "/Desktop/" + name;
    handleFileOpen({name, type:"file"}, path);
  }

  function iconFor(item) {
    const icons={"folder":"📁","folder-music":"🎵","folder-doc":"📄","folder-system":"⚙️",
      "folder-main":"🔧","folder-3p":"📦","folder-users":"👥","folder-user":"👤",
      "folder-apps":"⚡","folder-cfg":"🔧","folder-dl":"⬇","app":"⚡"};
    if (item.type==="app") return "⚡";
    if (item.type==="dir") return icons[item.icon]||"📁";
    const n=item.name.toLowerCase();
    if (n.match(/\.html?$/)) return "🌐";
    if (n.match(/\.(mp3|wav|ogg|flac)$/)) return "🎵";
    if (n.match(/\.(png|jpg|jpeg|gif|webp|svg)$/)) return "🖼️";
    if (n.match(/\.pdf$/)) return "📕";
    if (n.match(/\.(sdconfig|sdvc)$/)) return "⚙️";
    return "📄";
  }

  // ── Drop zone ───────────────────────────────────────────────
  function initDropZone() {
    const desk = document.getElementById("desktop");
    desk.addEventListener("dragover",e=>{e.preventDefault();e.dataTransfer.dropEffect="copy"});
    desk.addEventListener("drop",async e=>{
      e.preventDefault();
      for(const f of [...e.dataTransfer.files]){
        const fd=new FormData();
        fd.append("dest",userHome+"/Desktop");
        fd.append("file",f);
        await fetch("/api/fs/upload",{method:"POST",headers:{"X-SD-Token":currentUser.token},body:fd});
        notify(`"${f.name}" added to Desktop`);
      }
      renderDesktop();
    });
    desk.addEventListener("contextmenu",e=>{
      if(e.target.closest(".desk-icon")) return;
      e.preventDefault();
      showCtx(e.clientX,e.clientY,[
        {l:"New Folder",i:"📁",fn:async()=>{
          const n=prompt("Folder name:");
          if(!n)return;
          await fsApi("mkdir",{path:userHome+"/Desktop/"+n});
          renderDesktop();
        }},
        {l:"Refresh",i:"🔄",fn:renderDesktop},
        "sep",
        {l:"Open Files",i:"📁",fn:()=>openApp("Files")},
        {l:"Open SShell",i:"🖥️",fn:()=>openApp("SShell")},
      ]);
    });
  }

  // ── UAC ─────────────────────────────────────────────────────
  function showUAC(msg,cb){
    document.getElementById("uac-msg").textContent=msg;
    document.getElementById("uac-overlay").style.display="flex";
    uacCallback=cb;
  }
  function uacAllow(){document.getElementById("uac-overlay").style.display="none";if(uacCallback){uacCallback();uacCallback=null;}}
  function uacDeny() {document.getElementById("uac-overlay").style.display="none";uacCallback=null;notify("Denied by UAC.");}

  // ── Password prompt ──────────────────────────────────────────
  function showPassPrompt(username,cb){
    passCallback=cb; passUsername=username;
    document.getElementById("pass-desc").textContent=`Enter the password for "${username}":`;
    document.getElementById("pass-input").value="";
    document.getElementById("pass-err").textContent="";
    document.getElementById("pass-overlay").style.display="flex";
    setTimeout(()=>document.getElementById("pass-input").focus(),100);
  }
  async function passConfirm(){
    const pw=document.getElementById("pass-input").value;
    const data=await api("/api/auth/check",{method:"POST",body:JSON.stringify({username:passUsername,password:pw})});
    if(data.ok){
      document.getElementById("pass-overlay").style.display="none";
      if(passCallback){passCallback();passCallback=null;}
    } else {
      document.getElementById("pass-err").textContent=data.error||"Incorrect password";
    }
  }
  function passCancel(){document.getElementById("pass-overlay").style.display="none";passCallback=null;}

  // ── Context Menu ─────────────────────────────────────────────
  function showCtx(x,y,items){
    const menu=document.getElementById("ctx-menu");
    menu.innerHTML=items.map((item,i)=>{
      if(item==="sep") return '<div class="csep"></div>';
      return `<div class="ci${item.d?" danger":""}" data-ci="${i}">${item.i||""} ${item.l}</div>`;
    }).join("");
    menu._items=items;
    menu.querySelectorAll(".ci").forEach(el=>{
      const idx=parseInt(el.dataset.ci);
      el.onclick=()=>{items[idx].fn?.();hideCtx();};
    });
    const W=window.innerWidth,H=window.innerHeight;
    menu.style.display="block";
    menu.style.left=Math.min(x,W-170)+"px";
    menu.style.top =Math.min(y,H-200)+"px";
  }
  function hideCtx(){document.getElementById("ctx-menu").style.display="none";}

  // ── Crash ────────────────────────────────────────────────────
  function crash(msg,code){
    document.getElementById("crash-msg").textContent=msg||"A critical system file was removed.";
    document.getElementById("crash-code").textContent=code||"ERR_SYSTEM_FILE_MISSING";
    document.getElementById("crash").style.display="flex";
  }
  async function crashRecover(){
    await api("/api/fs/reset",{method:"POST"});
    notify("System restored. Reloading...");
    setTimeout(()=>location.reload(),1500);
  }

  // ── Notification ─────────────────────────────────────────────
  function notify(msg,dur=3500){
    const n=document.createElement("div"); n.className="notif"; n.textContent=msg;
    document.body.appendChild(n);
    setTimeout(()=>{n.style.opacity="0";n.style.transform="translateX(20px)";n.style.transition="all .3s";setTimeout(()=>n.remove(),300);},dur);
  }

  // ── Clock ────────────────────────────────────────────────────
  function startClock(){
    function tick(){
      const n=new Date();
      document.getElementById("clock").textContent=
        n.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})+" "+n.toLocaleDateString([],{month:"short",day:"numeric"});
    }
    tick(); setInterval(tick,10000);
  }

  // ── Process Monitor ──────────────────────────────────────────
  function registerProcess(id,title,type="app"){
    processes[id]={name:id,title,icon:"⚙️",pid:procId++,startTime:Date.now(),cpu:0,mem:0,type};
  }

  function startProcessMonitor(){
    setInterval(()=>{
      // Fake CPU/mem fluctuation for realism
      Object.keys(processes).forEach(id=>{
        processes[id].cpu=Math.round(Math.random()*5*10)/10;
        processes[id].mem=Math.round(10+Math.random()*40);
      });
    },2000);
  }

  function getProcessList(){return Object.values(processes);}

  function killProcess(id){
    if(processes[id]?.type==="system"){
      // System process — trigger consequences
      const consequences={
        "WindowManager":"ERR_WINDOW_MANAGER_KILLED",
        "DesktopShell":"ERR_DESKTOP_SHELL_KILLED",
        "FileSystem":"ERR_FILESYSTEM_KILLED",
      };
      if(consequences[id]){
        crash(`Critical process "${processes[id].title}" was terminated.`,consequences[id]);
        return;
      }
    }
    if(windows[id]) closeWindow(id);
    delete processes[id];
    notify("Process terminated.");
  }

  // ── Logout ───────────────────────────────────────────────────
  async function logout(){
    if(!confirm("Sign out?")) return;
    if(currentUser?.token) await api("/api/auth/logout",{method:"POST",body:JSON.stringify({token:currentUser.token})});
    currentUser=null; userHome=null; windows={}; processes={};
    document.getElementById("desktop").style.display="none";
    document.getElementById("topbar").style.display="none";
    document.getElementById("dock").style.display="none";
    document.getElementById("session-screen").style.display="flex";
    document.getElementById("desktop-icons").innerHTML="";
    document.getElementById("dock").innerHTML="";
    closeStartMenu();
    initSessionScreen();
  }

  // ── Inter-frame messaging ─────────────────────────────────────
  window.addEventListener("message",async e=>{
    const d=e.data;
    if(!d?.SD) return;
    const reply=(data)=>e.source?.postMessage({SD:true,...data},"*");
    switch(d.action){
      case "notify":        notify(d.msg); break;
      case "openApp":       openApp(d.app); break;
      case "openFile":      openHTMLFile(d.path,d.name); break;
      case "crash":         crash(d.msg,d.code); break;
      case "refreshDesk":   renderDesktop(); break;
      case "getContext":
        reply({action:"context",username:currentUser?.username,userHome,token:currentUser?.token,uacEnabled});break;
      case "setUAC":        uacEnabled=d.val==="0"?false:true; settings.uac=uacEnabled; saveUserSettings(); break;
      case "getUAC":        reply({action:"uacVal",val:uacEnabled?"1":"0"}); break;
      case "getSetting":    reply({action:"setting",key:d.key,val:settings[d.key]??null}); break;
      case "setSetting":    settings[d.key]=d.val; saveUserSettings(); break;
      case "getSettings":   reply({action:"settings",settings}); break;
      case "saveSettings":  Object.assign(settings,d.settings); saveUserSettings(); break;
      case "getPinned":     reply({action:"pinned",apps:pinnedApps}); break;
      case "setPinned":     pinnedApps=d.apps; savePinnedApps(); buildDock(); break;
      case "getProcesses":  reply({action:"processes",list:getProcessList()}); break;
      case "killProcess":   killProcess(d.id); break;
      case "passPrompt":    showPassPrompt(d.username,()=>reply({action:"passOk"})); break;
      case "logout":        logout(); break;
      case "fsOp":
        const result=await fsApi(d.op,d.body||{});
        reply({action:"fsResult",reqId:d.reqId,result}); break;
    }
  });

  // ── Init ──────────────────────────────────────────────────────
  function init(){
    initDropZone();
    document.addEventListener("click",e=>{
      if(!e.target.closest("#start-menu")&&!e.target.closest("#start-btn")) closeStartMenu();
      if(!e.target.closest("#ctx-menu")) hideCtx();
    });
    document.getElementById("pass-input")?.addEventListener("keydown",e=>{if(e.key==="Enter")passConfirm();});
    initSessionScreen();
  }

  return {
    openApp,closeWindow,minimizeWindow,maximizeWindow,restoreWindow,
    uacAllow,uacDeny,passConfirm,passCancel,
    notify,crash,crashRecover,showCtx,hideCtx,
    renderDesktop,toggleStartMenu,closeStartMenu,smSearch,
    ssTab,ssSelectUser,ssLogin,ssSignup,logout,
    getProcessList,killProcess,
    FS:{
      list:(path)=>fsApi("list",{path}),
      read:(path)=>fsApi("read",{path}),
      write:(path,content,mime,meta)=>fsApi("write",{path,content,mime,meta}),
      mkdir:(path)=>fsApi("mkdir",{path}),
      delete:(path,force)=>fsApi("delete",{path,force}),
      move:(src,dst)=>fsApi("move",{src,dst}),
    },
    getCurrentUser:()=>currentUser,
    getUserHome:()=>userHome,
    getSettings:()=>settings,
    getProcesses:()=>processes,
    createWindow,
    init
  };
})();

window.addEventListener("DOMContentLoaded",()=>SD.init());

// ── File viewer ──────────────────────────────────────────────
function closeViewer() { document.getElementById("viewer-overlay").style.display="none"; }
async function openFileViewer(path, name) {
  const data = await SD.FS.read(path);
  if (data.error) { SD.notify("Cannot open: " + data.error); return; }
  const mime = data.mime || "text/plain";
  const content = data.content || "";
  document.getElementById("viewer-title").textContent = name;
  const box = document.getElementById("viewer-content");
  box.innerHTML = "";
  if (mime.startsWith("image/")) {
    const img = document.createElement("img");
    img.src = "data:" + mime + ";base64," + content;
    box.appendChild(img);
  } else if (mime.startsWith("audio/")) {
    const aud = document.createElement("audio");
    aud.src = "data:" + mime + ";base64," + content;
    aud.controls = true;
    box.appendChild(aud);
  } else if (mime.startsWith("text/") || mime === "application/json") {
    const pre = document.createElement("pre");
    try { pre.textContent = atob(content); } catch(e) { pre.textContent = content; }
    box.appendChild(pre);
  } else {
    box.innerHTML = '<p style="color:var(--text-dim);font-family:var(--mono);font-size:13px">Cannot preview this file type.<br>(' + mime + ')</p>';
  }
  document.getElementById("viewer-overlay").style.display = "flex";
}

// Expose to SD
SD.openFileViewer = openFileViewer;
</script>
